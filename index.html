<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-orange: #E67E22; --dark-orange: #D35400; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-overflow-scrolling: touch; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .lang-am { font-family: 'Noto Sans Ethiopic', sans-serif; }

        /* Header Branding */
        .header { 
            background: var(--dark-orange);
            color: white; padding: 8px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .hotel-brand { text-align: center; flex-grow: 1; }
        .hotel-brand h1 { font-family: 'Playfair Display', serif; font-size: 19px; line-height: 1; color: #fff; }
        .hotel-brand span { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #ffe0b2; }
        .menu-icon { font-size: 24px; cursor: pointer; color: white; width: 40px; }

        /* Maximized Categories (+25%) */
        .nav-bar { 
            display: flex; overflow-x: auto; padding: 15px 5px; 
            background: #fff; position: sticky; top: 48px; z-index: 900; 
            border-bottom: 1px solid #eee; scroll-behavior: smooth;
        }
        .nav-item { text-align: center; min-width: 140px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.05); }
        .nav-item img { 
            width: 95px; height: 95px; /* Maximized */
            border-radius: 50%; display: block; margin: 0 auto 8px; 
            border: 3px solid #f0f0f0; object-fit: cover; 
        }
        .nav-item.active img { border-color: var(--p-orange); box-shadow: 0 4px 12px rgba(230,126,34,0.3); }

        /* Maximized Food Items (+25%) */
        .container { padding: 12px; }
        .card { 
            display: flex; align-items: center; background: white; border-radius: 15px; 
            margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2;
            box-shadow: 0 3px 10px rgba(0,0,0,0.04);
            content-visibility: auto; 
        }
        .food-img { 
            width: 125px; height: 125px; /* Maximized */
            border-radius: 12px; object-fit: cover; margin-right: 18px;
            background: #f9f9f9;
        }
        .info .title { font-size: 18px; font-weight: 600; color: var(--p-orange); }
        .info .ingred { font-size: 12px; color: #777; font-style: italic; margin-top: 3px; }
        .info .price { font-size: 17px; font-weight: 700; color: var(--p-orange); margin-top: 6px; }

        /* Admin UI */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y:auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .edit-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }

        /* Overlays */
        #welcomeNote {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--dark-orange); color: white; padding: 35px; border-radius: 20px;
            text-align: center; z-index: 5000; border: 2px solid white;
        }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:2500; align-items:center; justify-content:center; }
        .login-card { background:white; padding:30px; border-radius:15px; width:85%; max-width:320px; text-align:center; }
    </style>
</head>
<body id="bodyTag">

<header class="header">
    <div class="menu-icon" onclick="showLogin()">☰</div>
    <div class="hotel-brand">
        <h1 id="displayHotelName">SGS HOTEL</h1>
        <span>MENU</span>
    </div>
    <div class="lang-toggle-box">
        <button onclick="toggleLang()" style="border:none; background:white; color:var(--dark-orange); padding:4px 10px; border-radius:12px; font-size:11px; font-weight:bold;">EN/አማ</button>
    </div>
</header>

<div id="welcomeNote"><h2>ACCESS GRANTED</h2><p>SGS Manager Online</p></div>

<nav class="nav-bar">
    <div class="nav-item active" id="cat-breakfast" onclick="changeCat('breakfast')">
        <img src="b1.jpg" loading="lazy"><span id="nav-text-break">Breakfast</span>
    </div>
    <div class="nav-item" id="cat-lunchdinner" onclick="changeCat('lunchdinner')">
        <img src="l1.jpg" loading="lazy"><span id="nav-text-lunch">Lunch/Dinner</span>
    </div>
    <div class="nav-item" id="cat-beverages" onclick="changeCat('beverages')">
        <img src="d1.jpg" loading="lazy"><span id="nav-text-bev">Beverages</span>
    </div>
</nav>

<div class="container" id="menuListing"></div>

<div id="loginOverlay" class="overlay">
    <div class="login-card">
        <h3 style="color:var(--dark-orange); margin-bottom:20px;">STAFF LOGIN</h3>
        <input type="text" id="userInput" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
        <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:5px;">
        <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--dark-orange); color:white; border:none; border-radius:8px; font-weight:bold;">LOGIN</button>
        <p onclick="hideLogin()" style="margin-top:15px; color:gray; cursor:pointer; font-size:12px;">Back to Menu</p>
    </div>
</div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-orange); padding:15px; color:white; border-radius:8px;">
        <h4>SGS MENU MANAGER</h4>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:28px;">×</button>
    </div>
    <div style="overflow-x:auto; margin-top:15px;">
        <table>
            <thead><tr><th>Item Name</th><th>Ingredients</th><th>Price (ETB)</th><th>Images</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button onclick="saveAndClear()" style="width:100%; padding:18px; background:#27ae60; color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold; font-size:16px;">SAVE ALL UPDATES</button>
</div>

<script>
    let currentLang = 'en';
    let currentCat = 'breakfast';
    
    // 3. Restored all 12 Items
    let data = [
        { id: 1, cat: 'breakfast', en: 'Kitfo Royale', am: 'ክትፎ ሮያል', price: 500, img: 'b1.jpg', ing: 'Minced beef, nitir kibe, mitmita' },
        { id: 2, cat: 'breakfast', en: 'Special Omelet', am: 'ልዩ እንቁላል', price: 350, img: 'b2.jpg', ing: 'Eggs, onions, green pepper, tomato' },
        { id: 3, cat: 'breakfast', en: 'Chechebsa', am: 'ጨጨብሳ', price: 300, img: 'b3.jpg', ing: 'Shredded flatbread, honey, kibe' },
        { id: 4, cat: 'breakfast', en: 'Full Breakfast', am: 'ቁርስ በሙሉ', price: 450, img: 'b4.jpg', ing: 'Eggs, toast, honey, beans' },
        
        { id: 5, cat: 'lunchdinner', en: 'Golden Dorowet', am: 'ወርቃማው ዶሮወጥ', price: 600, img: 'l1.jpg', ing: 'Chicken stew, boiled eggs, local spices' },
        { id: 6, cat: 'lunchdinner', en: 'Tegabino Shiro', am: 'ተጋቢኖ ሽሮ', price: 250, img: 'l2.jpg', ing: 'Thick chickpea stew, clay pot' },
        { id: 7, cat: 'lunchdinner', en: 'Margherita Pizza', am: 'ፒዛ ማርጋሪታ', price: 480, img: 'l3.jpg', ing: 'Fresh tomato, mozzarella, basil' },
        { id: 8, cat: 'lunchdinner', en: 'SGS Burger', am: 'ኤስ ጂ ኤስ በርገር', price: 550, img: 'l4.jpg', ing: 'Beef patty, cheese, special sauce' },
        
        { id: 9, cat: 'beverages', en: 'SGS Macchiato', am: 'ኤስ ጂ ኤስ ማኪያቶ', price: 60, img: 'd1.jpg', ing: 'Ethiopian espresso, steamed milk' },
        { id: 10, cat: 'beverages', en: 'Mango Juice', am: 'የማንጎ ጭማቂ', price: 120, img: 'd2.jpg', ing: '100% Organic mango fruit' },
        { id: 11, cat: 'beverages', en: 'St. George Beer', am: 'ቅዱስ ጊዮርጊስ ቢራ', price: 150, img: 'd3.jpg', ing: 'Premium local cold beer' },
        { id: 12, cat: 'beverages', en: 'Soft Drink', am: 'ለስላሳ መጠጥ', price: 80, img: 'd4.jpg', ing: 'Coke, Fanta, or Sprite' }
    ];

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        document.getElementById('displayHotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');
        
        data.filter(i => i.cat === currentCat).forEach(item => {
            list.innerHTML += `<div class="card">
                <img src="${item.img}" class="food-img" loading="lazy" onerror="this.src='https://via.placeholder.com/125'">
                <div class="info">
                    <div class="title">${currentLang === 'en' ? item.en : item.am}</div>
                    <div class="ingred">${item.ing}</div>
                    <div class="price">${item.price} ETB</div>
                </div>
            </div>`;
        });
        document.getElementById('bodyTag').className = (currentLang === 'am' ? 'lang-am' : '');
    }

    function changeCat(c) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('cat-'+c).classList.add('active');
        render();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en' ? 'am' : 'en');
        render();
    }

    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    
    // 1. Do not save credentials (wipe fields)
    function hideLogin() { 
        document.getElementById('userInput').value = ""; 
        document.getElementById('passInput').value = ""; 
        document.getElementById('loginOverlay').style.display = 'none'; 
    }

    function handleLogin() {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === "admin" && p === "sgs") {
            const note = document.getElementById('welcomeNote');
            note.style.display = 'block';
            setTimeout(() => { note.style.display = 'none'; openAdmin(); hideLogin(); }, 1200);
        } else { alert("Login Denied"); }
    }

    function openAdmin() {
        document.getElementById('adminDashboard').style.display = 'block';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td><input class="edit-input" value="${item.en}" onchange="editItem(${index}, 'en', this.value)"></td>
                <td><input class="edit-input" value="${item.ing}" onchange="editItem(${index}, 'ing', this.value)"></td>
                <td><input class="edit-input" type="number" value="${item.price}" onchange="editItem(${index}, 'price', this.value)"></td>
                <td><input type="file" onchange="uploadImg(${index}, this)"></td>
            </tr>`;
        });
    }

    function uploadImg(idx, input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { data[idx].img = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function editItem(idx, key, val) { data[idx][key] = val; }
    function saveAndClear() { alert("SGS Database Updated Locally!"); closeAdmin(); }
    function closeAdmin() { document.getElementById('adminDashboard').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
