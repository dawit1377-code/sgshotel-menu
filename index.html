<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel - Luxury Room Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #2d1b18; --card: #3d2b27; --cream: #fff8e1; --green: #1b3022; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--cream); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        header { text-align: center; padding: 25px 10px; border-bottom: 5px solid var(--gold); background: var(--dark); }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .side-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .sgs-text { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; color: var(--green); text-shadow: 2px 2px var(--gold); line-height: 1; }
        .g-btn { background: var(--green); color: var(--gold); width: 55px; height: 55px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; border: 2px dashed var(--gold); font-weight: bold; }
        .hotel-label { background: var(--green); color: var(--gold); padding: 5px 30px; font-weight: 900; letter-spacing: 4px; border-radius: 4px; display: inline-block; margin-top: 10px; border: 1px solid var(--gold); }
        .welcome-note { font-size: 0.85rem; max-width: 320px; margin: 15px auto 0; font-style: italic; line-height: 1.4; opacity: 0.8; }
        
        /* LUXURY TITLE FOR ROOM GUESTS */
        .luxury-room-title { color: var(--gold); font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: 2px; font-size: 1.1rem; margin-top: 20px; text-transform: uppercase; border-top: 1px solid rgba(212,175,55,0.3); display: inline-block; padding-top: 10px; }

        .lang-container { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { background: var(--gold); color: #000; }

        .cat-head { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2rem; margin: 40px 0 15px; letter-spacing: 2px; }
        
        /* LUXURY ITEM CARDS */
        .item-row { background: var(--card); margin: 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .item-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .item-content { padding: 20px; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .item-name { color: var(--gold); font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.4rem; }
        .item-price { color: var(--cream); font-weight: 600; font-size: 1.1rem; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 5px; }
        .item-ingredients { color: #ccc; font-size: 0.85rem; line-height: 1.5; font-weight: 300; font-style: italic; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 20px; text-align: center; border-top: 4px solid var(--gold); z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .call-btn { display: inline-block; background: var(--gold); color: #000 !important; text-decoration: none; padding: 16px 60px; border-radius: 35px; font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }
    </style>
</head>
<body>

<header>
    <div class="logo-row">
        <img src="logo-left.jpg" class="side-img">
        <div class="sgs-text">S<div class="g-btn">G</div>S</div>
        <img src="logo-right.jpg" class="side-img">
    </div>
    <div class="hotel-label">HOTEL</div>
    <p id="welcome-msg" class="welcome-note">Exquisite dining delivered to your door. Please browse our curated selection.</p>
    <div class="luxury-room-title">Luxury Menu for Room Guests</div>
</header>

<div class="lang-container">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">ENGLISH</button>
    <button class="lang-btn" id="btn-am" onclick="setLang('am')">አማርኛ</button>
</div>

<div style="max-width: 650px; margin: 0 auto;">
    <h2 class="cat-head" id="cat-food">Cuisine</h2>
    <div id="food-list"></div>
    
    <h2 class="cat-head" id="cat-drink">Beverages</h2>
    <div id="drink-list"></div>
</div>

<div class="footer-bar">
    <a href="tel:+251954954591" class="call-btn" id="call-text">CALL TO ORDER</a>
</div>

<script>
    const trans = {
        en: { 
            welcome: "Exquisite dining delivered to your door. Please browse our curated selection.", 
            food: "Cuisine", 
            drinks: "Beverages", 
            call: "CALL TO ORDER",
            ingLabel: "Ingredients: "
        },
        am: { 
            welcome: "ምርጥ ምግቦች እስከ እርሶ በር ድረስ። እባክዎ ምርጫዎን ይመልከቱ።", 
            food: "ምግቦች", 
            drinks: "መጠጦች", 
            call: "ትዕዛዝ ለመስጠት ይደውሉ",
            ingLabel: "ጥሬ ዕቃዎች፡ "
        }
    };

    const foods = [
        {
            n: "Beyayentu", 
            am_n: "በያይነቱ",
            p: 450, 
            img: "beyayentu.jpg", 
            ing: "Injera, Shiro, Misir, Gomen, Kik Alicha, Key Sir, Salads.",
            am_ing: "እንጀራ፣ ሽሮ፣ ምስር፣ ጎመን፣ ክክ አልጫ፣ ቀይ ስር፣ ሰላጣ።"
        },
        {
            n: "Egg Sandwich", 
            am_n: "የእንቁላል ሳንድዊች",
            p: 280, 
            img: "egg-sandwich.jpg", 
            ing: "Toasted Bread, Scrambled Eggs, Tomatoes, Onions, Green Chilies, Butter.",
            am_ing: "የተጠበሰ ዳቦ፣ የተመታ እንቁላል፣ ቲማቲም፣ ቀይ ሽንኩርት፣ ቃሪያ፣ ቅቤ።"
        },
        {
            n: "Pizza Margarita", 
            am_n: "ማርጋሪታ ፒዛ",
            p: 550, 
            img: "pizza.jpg", 
            ing: "Hand-tossed Dough, Mozzarella Cheese, Fresh Tomato Sauce, Basil, Olive Oil.",
            am_ing: "ፒዛ ሊጥ፣ ሞዛሬላ ቺዝ፣ ትኩስ የቲማቲም ሶስ፣ ባሲል፣ የወይራ ዘይት።"
        },
        {
            n: "Shiro Tegabino", 
            am_n: "ሽሮ ተጋቢኖ",
            p: 350, 
            img: "tegabino.jpg", 
            ing: "Spiced Chickpea Flour, Garlic, Ginger, Berbere, Herb Butter (Niter Kibbeh), Injera.",
            am_ing: "ሽንብራ ሽሮ፣ ነጭ ሽንኩርት፣ ዝንጅብል፣ በርበሬ፣ የጥበስ ቅቤ፣ እንጀራ።"
        },
        {
            n: "Special Burger", 
            am_n: "ስፔሻል በርገር",
            p: 650, 
            img: "burger.jpg", 
            ing: "Beef Patty, Caramelized Onions, Cheese, Lettuce, Special House Sauce, Sesame Bun.",
            am_ing: "የከብት ስጋ፣ የተጠበሰ ሽንኩርት፣ ቺዝ፣ ሰላጣ፣ ስፔሻል ሶስ፣ በርገር ዳቦ።"
        }
    ];

    const drinks = [
        {
            n: "Bottled Water", 
            am_n: "ታሸገ ውሃ",
            p: 60, 
            img: "water.jpg", 
            ing: "Pure Mineral Water (500ml).",
            am_ing: "ንጹህ የተፈጥሮ ማዕድን ውሃ (500ml)።"
        },
        {
            n: "Machiato", 
            am_n: "ማኪያቶ",
            p: 120, 
            img: "macchiato.jpg", 
            ing: "Strong Espresso, Steamed Milk Foam, Ethiopian Highland Coffee Beans.",
            am_ing: "ኤስፕሬሶ፣ የወተት አረፋ፣ የኢትዮጵያ ምርጥ ቡና።"
        },
        {
            n: "American Coffee", 
            am_n: "አሜሪካን ኮፊ",
            p: 110, 
            img: "americano.jpg", 
            ing: "Double Shot Espresso, Hot Water, Smooth Rich Aroma.",
            am_ing: "ድርብ ኤስፕሬሶ፣ ሙቅ ውሃ።"
        }
    ];

    function setLang(l) {
        const t = trans[l];
        document.getElementById('welcome-msg').innerText = t.welcome;
        document.getElementById('cat-food').innerText = t.food;
        document.getElementById('cat-drink').innerText = t.drinks;
        document.getElementById('call-text').innerText = t.call;
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
        document.getElementById('btn-am').classList.toggle('active', l === 'am');
        build(foods, "food-list", l);
        build(drinks, "drink-list", l);
    }

    function build(data, id, lang) {
        let h = "";
        data.forEach(x => {
            const name = lang === 'en' ? x.n : x.am_n;
            const ingredients = lang === 'en' ? x.ing : x.am_ing;
            const ingLabel = trans[lang].ingLabel;
            
            h += `
            <div class="item-row">
                <img src="${x.img}" class="item-img" alt="${name}">
                <div class="item-content">
                    <div class="item-header">
                        <span class="item-name">${name}</span>
                        <span class="item-price">${x.p} ETB</span>
                    </div>
                    <div class="item-ingredients">
                        <strong>${ingLabel}</strong>${ingredients}
                    </div>
                </div>
            </div>`;
        });
        document.getElementById(id).innerHTML = h;
    }

    // Initial Load
    setLang('en');
</script>
</body>
</html>
