<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel - Luxury Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF8C00;
            --bg-white: #FFFFFF;
            --text-dark: #333333;
            --light-gray: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; }
        body { background-color: var(--bg-white); color: var(--text-dark); }

        /* Mobile App Header */
        .app-header {
            background-color: var(--primary-orange);
            color: white;
            padding: 18px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Category Bar with Images */
        .category-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 5px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .category-item {
            text-align: center;
            cursor: pointer;
            flex: 1;
            transition: 0.3s;
        }

        .cat-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
            margin-bottom: 5px;
        }

        .category-item.active .cat-img { border-color: var(--primary-orange); }
        .category-item.active span { color: var(--primary-orange); font-weight: 600; }
        .cat-label { font-size: 11px; display: block; color: #666; }

        /* Menu List */
        .menu-container { padding: 15px; }

        .menu-card {
            display: flex;
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .food-img {
            width: 85px;
            height: 85px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .food-info { flex: 1; }
        .food-title { font-size: 15px; font-weight: 600; color: var(--primary-orange); }
        .food-desc { font-size: 11px; color: #777; margin: 3px 0; }
        .food-price { font-size: 14px; font-weight: 600; color: #222; }

        /* Admin Dashboard UI */
        #adminPanel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); /* Dim background */
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .login-box h2 { margin-bottom: 20px; color: #333; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .login-btn { background: var(--primary-orange); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .cancel-btn { margin-top: 15px; display: inline-block; color: #888; font-size: 13px; cursor: pointer; }

        /* Edit Overlay */
        .edit-badge { background: #4CAF50; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; position: fixed; top: 80px; left: 10px; z-index: 500; display: none; }
        .editable:focus { outline: 2px solid var(--primary-orange); background: #fff9f0; padding: 2px; }

        /* Language Button */
        .lang-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-orange);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 500;
        }
    </style>
</head>
<body id="mainBody">

<div class="edit-badge" id="editBadge">EDIT MODE ACTIVE</div>

<header class="app-header">
    <h1 class="editable" id="hotelTitle" contenteditable="false">SGS HOTEL</h1>
</header>

<div class="category-nav">
    <div class="category-item active" onclick="filterCategory('breakfast', this)">
        <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?w=100" class="cat-img">
        <span class="cat-label">Breakfast</span>
    </div>
    <div class="category-item" onclick="filterCategory('lunchdinner', this)">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100" class="cat-img">
        <span class="cat-label">Lunch/Dinner</span>
    </div>
    <div class="category-item" onclick="filterCategory('beverages', this)">
        <img src="https://images.unsplash.com/photo-1544145945-f904253d0c7b?w=100" class="cat-img">
        <span class="cat-label">Beverages</span>
    </div>
</div>

<div class="menu-container" id="menuList">
    </div>

<div class="lang-btn" onclick="toggleLanguage()">English / አማርኛ</div>

<div id="adminPanel">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="login-btn" onclick="checkLogin()">Login</button>
        <span class="cancel-btn" onclick="hideAdmin()">Cancel</span>
    </div>
</div>

<div onclick="showAdmin()" style="position:fixed; bottom:0; left:0; width:50px; height:50px; opacity:0;"></div>

<script>
    let menuData = [];
    let currentLang = 'en';

    async function loadData() {
        const response = await fetch(`${currentLang}.json`);
        menuData = await response.json();
        renderMenu('breakfast');
    }

    function renderMenu(cat) {
        const list = document.getElementById('menuList');
        list.innerHTML = "";
        const filtered = menuData.filter(item => item.cat === cat);
        
        filtered.forEach(item => {
            list.innerHTML += `
                <div class="menu-card">
                    <img src="${item.img}" class="food-img">
                    <div class="food-info">
                        <div class="food-title editable" contenteditable="false">${item.title}</div>
                        <div class="food-desc editable" contenteditable="false">${item.desc}</div>
                        <div class="food-price editable" contenteditable="false">${item.price} ETB</div>
                    </div>
                </div>
            `;
        });
    }

    function filterCategory(cat, el) {
        document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderMenu(cat);
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'en') ? 'am' : 'en';
        loadData();
    }

    function showAdmin() { document.getElementById('adminPanel').style.display = 'flex'; }
    function hideAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "sgs") {
            enableEdit();
            hideAdmin();
        } else {
            alert("Wrong credentials");
        }
    }

    function enableEdit() {
        document.getElementById('editBadge').style.display = 'block';
        document.querySelectorAll('.editable').forEach(el => {
            el.setAttribute('contenteditable', 'true');
        });
        alert("Admin Mode: Tap any text to edit. Changes save locally for now.");
    }

    loadData();
</script>
</body>
</html>
