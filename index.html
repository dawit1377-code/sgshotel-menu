<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-orange: #FF8C00; --gold: #D4AF37; --bg: #ffffff; --dark: #121212; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-overflow-scrolling: touch; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 80px; font-family: 'Poppins', sans-serif; }
        .lang-am { font-family: 'Noto Sans Ethiopic', sans-serif; }

        /* 1. Minimized Orange Header */
        .header { 
            background: var(--p-orange);
            color: white; 
            padding: 20px 10px; /* Minimized height */
            text-align: center; 
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 24px; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }
        .menu-label { 
            color: white; 
            font-weight: 700; 
            font-size: 14px; 
            letter-spacing: 4px;
            opacity: 0.9;
        }

        /* 2. Maximized Categories */
        .nav-bar { 
            display: flex; overflow-x: auto; padding: 20px 5px; 
            background: #fff; position: sticky; top: 85px; z-index: 90; 
            border-bottom: 1px solid #eee;
        }
        .nav-item { text-align: center; min-width: 120px; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: var(--p-orange); transform: scale(1.1); }
        .nav-item img { 
            width: 65px; height: 65px; /* Maximized size */
            border-radius: 50%; display: block; margin: 0 auto 8px; 
            border: 3px solid #f0f0f0; object-fit: cover; 
        }
        .nav-item.active img { border-color: var(--p-orange); box-shadow: 0 4px 10px rgba(255,140,0,0.2); }
        .cat-label { font-size: 13px; font-weight: 600; }

        /* Menu List */
        .container { padding: 15px; }
        .card { 
            display: flex; align-items: center; background: white; border-radius: 12px; 
            margin-bottom: 12px; padding: 12px; border: 1px solid #f5f5f5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .food-img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; margin-right: 15px; background: #eee; }
        .info { flex: 1; }
        .title { font-size: 16px; font-weight: 600; color: #333; }
        .price { font-size: 15px; font-weight: 700; color: var(--p-orange); margin-top: 4px; }

        /* Bottom Controls */
        .footer-tools { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px; z-index: 500; border-top: 1px solid #eee; }
        .btn-action { flex: 1; margin: 0 5px; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-lang { background: var(--p-orange); color: white; }
        .btn-admin { background: #333; color: white; }

        /* Admin Dashboard & Image Upload */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:15px; overflow-y:auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .edit-input { width: 100%; border: 1px solid #ccc; padding: 6px; border-radius: 4px; }
        .file-btn { font-size: 10px; margin-top: 5px; display: block; }

        /* Login Overlay */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2500; align-items:center; justify-content:center; }
        .login-card { background:white; padding:30px; border-radius:15px; width:85%; max-width:320px; text-align:center; }
    </style>
</head>
<body id="bodyTag">

<header class="header">
    <h1 id="displayHotelName">SGS HOTEL</h1>
    <div class="menu-label">MENU</div>
</header>

<nav class="nav-bar">
    <div class="nav-item active" id="cat-breakfast" onclick="changeCat('breakfast')">
        <img src="b1.jpg" id="cat-img-1"><span id="nav-text-break">Breakfast</span>
    </div>
    <div class="nav-item" id="cat-lunchdinner" onclick="changeCat('lunchdinner')">
        <img src="l1.jpg" id="cat-img-2"><span id="nav-text-lunch">Lunch/Dinner</span>
    </div>
    <div class="nav-item" id="cat-beverages" onclick="changeCat('beverages')">
        <img src="d1.jpg" id="cat-img-3"><span id="nav-text-bev">Beverages</span>
    </div>
</nav>

<div class="container" id="menuListing"></div>

<div class="footer-tools">
    <button class="btn-action btn-admin" onclick="showLogin()">ADMIN LOGIN</button>
    <button class="btn-action btn-lang" onclick="toggleLang()">ENGLISH / አማርኛ</button>
</div>

<div id="loginOverlay" class="overlay">
    <div class="login-card">
        <h2>STAFF LOGIN</h2><br>
        <input type="text" id="userInput" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
        <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
        <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--p-orange); color:white; border:none; border-radius:5px; font-weight:bold;">ENTER</button>
        <p onclick="hideLogin()" style="margin-top:15px; color:gray; cursor:pointer; font-size:12px;">Cancel</p>
    </div>
</div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="color:var(--p-orange);">MENU MANAGER</h3>
        <button onclick="closeAdmin()" style="color:red; font-weight:bold; border:none; background:none; cursor:pointer;">EXIT</button>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>Name (EN)</th><th>Name (AM)</th><th>Price</th><th>Image</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button onclick="saveAndClear()" style="width:100%; padding:18px; background:#28a745; color:white; border:none; border-radius:10px; margin-top:25px; font-weight:700; font-size:16px;">SAVE ALL CHANGES</button>
</div>

<script>
    let currentLang = 'en';
    let currentCat = 'breakfast';
    
    let data = [
        { id: 1, cat: 'breakfast', en: 'Kitfo Royale', am: 'ክትፎ ሮያል', price: 500, img: 'b1.jpg' },
        { id: 2, cat: 'breakfast', en: 'Special Omelet', am: 'ልዩ እንቁላል ፍርፍር', price: 350, img: 'b2.jpg' },
        { id: 3, cat: 'breakfast', en: 'Chechebsa', am: 'ጨጨብሳ', price: 300, img: 'b3.jpg' },
        { id: 4, cat: 'breakfast', en: 'Full Breakfast', am: 'ቁርስ በሙሉ', price: 450, img: 'b4.jpg' },
        { id: 5, cat: 'lunchdinner', en: 'Golden Dorowet', am: 'ወርቃማው ዶሮወጥ', price: 600, img: 'l1.jpg' },
        { id: 6, cat: 'lunchdinner', en: 'Tegabino Shiro', am: 'ተጋቢኖ ሽሮ', price: 250, img: 'l2.jpg' },
        { id: 7, cat: 'lunchdinner', en: 'Margherita Pizza', am: 'ፒዛ ማርጋሪታ', price: 480, img: 'l3.jpg' },
        { id: 8, cat: 'lunchdinner', en: 'SGS Burger', am: 'ኤስ ጂ ኤስ በርገር', price: 550, img: 'l4.jpg' },
        { id: 9, cat: 'beverages', en: 'SGS Macchiato', am: 'ኤስ ጂ ኤስ ማኪያቶ', price: 60, img: 'd1.jpg' },
        { id: 10, cat: 'beverages', en: 'Mango Juice', am: 'የማንጎ ጭማቂ', price: 120, img: 'd2.jpg' },
        { id: 11, cat: 'beverages', en: 'St. George Beer', am: 'ቅዱስ ጊዮርጊስ ቢራ', price: 150, img: 'd3.jpg' },
        { id: 12, cat: 'beverages', en: 'Soft Drink', am: 'ቀዝቃዛ ለስላሳ መጠጥ', price: 80, img: 'd4.jpg' }
    ];

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        
        document.getElementById('displayHotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');
        document.getElementById('nav-text-break').innerText = (currentLang === 'en' ? 'Breakfast' : 'ቁርስ');
        document.getElementById('nav-text-lunch').innerText = (currentLang === 'en' ? 'Lunch/Dinner' : 'ምሳ/እራት');
        document.getElementById('nav-text-bev').innerText = (currentLang === 'en' ? 'Beverages' : 'መጠጦች');

        const filtered = data.filter(i => i.cat === currentCat);
        filtered.forEach(item => {
            const title = (currentLang === 'en' ? item.en : item.am);
            list.innerHTML += `
                <div class="card">
                    <img src="${item.img}" class="food-img" onerror="this.src='https://via.placeholder.com/85'">
                    <div class="info">
                        <div class="title">${title}</div>
                        <div class="price">${item.price} ETB</div>
                    </div>
                </div>`;
        });
        document.getElementById('bodyTag').className = (currentLang === 'am' ? 'lang-am' : '');
    }

    function changeCat(c) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('cat-'+c).classList.add('active');
        render();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en' ? 'am' : 'en');
        render();
    }

    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { 
        document.getElementById('userInput').value = ""; 
        document.getElementById('passInput').value = ""; 
        document.getElementById('loginOverlay').style.display = 'none'; 
    }

    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") {
            openAdmin();
            hideLogin();
        } else { alert("Access Denied"); }
    }

    function openAdmin() {
        document.getElementById('adminDashboard').style.display = 'block';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><input class="edit-input" value="${item.en}" onchange="editItem(${index}, 'en', this.value)"></td>
                    <td><input class="edit-input" value="${item.am}" onchange="editItem(${index}, 'am', this.value)"></td>
                    <td><input class="edit-input" type="number" value="${item.price}" onchange="editItem(${index}, 'price', this.value)"></td>
                    <td>
                        <img src="${item.img}" style="width:30px; height:30px; border-radius:4px; display:block; margin-bottom:5px;">
                        <input type="file" class="file-btn" onchange="uploadImg(${index}, this)">
                    </td>
                </tr>`;
        });
    }

    // 3. Admin Upload Logic
    function uploadImg(idx, input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                data[idx].img = e.target.result; // Temporarily update image with local data
                alert("New image selected for item " + (idx + 1));
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function editItem(idx, key, val) { data[idx][key] = val; }
    function saveAndClear() { alert("All changes including images updated locally!"); closeAdmin(); }
    function closeAdmin() { document.getElementById('adminDashboard').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
