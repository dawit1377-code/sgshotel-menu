<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel - Luxury Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-orange: #FF8C00; --bg: #ffffff; --text: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }

        /* Header */
        .header { background: var(--p-orange); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; font-weight: 600; }

        /* Categories */
        .nav-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #eee; }
        .nav-item { text-align: center; cursor: pointer; flex: 1; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--p-orange); border-bottom: 2px solid var(--p-orange); }
        .nav-item img { width: 40px; height: 40px; border-radius: 50%; display: block; margin: 0 auto 5px; border: 1px solid #ddd; }

        /* Menu Items */
        .container { padding: 15px; }
        .card { display: flex; background: white; border-radius: 10px; margin-bottom: 12px; padding: 10px; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .food-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .info { flex: 1; }
        .title { font-size: 14px; font-weight: 600; color: var(--p-orange); }
        .desc { font-size: 11px; color: #777; margin: 2px 0; }
        .price { font-size: 13px; font-weight: 600; }

        /* Professional Admin Dashboard */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--p-orange); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .edit-input { width: 100%; border: 1px solid orange; padding: 4px; border-radius: 4px; }
        .save-btn { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; }

        /* Buttons */
        .lang-btn { position: fixed; bottom: 20px; right: 20px; background: var(--p-orange); color: white; padding: 12px 25px; border-radius: 30px; font-size: 12px; cursor: pointer; z-index: 500; }
        .login-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; }
        .login-box { background:white; padding:30px; border-radius:15px; width:80%; max-width:300px; text-align:center; }
    </style>
</head>
<body>

<div class="header" id="hotelName">SGS HOTEL</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="changeCat('breakfast', this)"><img src="b1.jpg"><span>Breakfast</span></div>
    <div class="nav-item" onclick="changeCat('lunchdinner', this)"><img src="l1.jpg"><span>Lunch/Dinner</span></div>
    <div class="nav-item" onclick="changeCat('beverages', this)"><img src="d1.jpg"><span>Beverages</span></div>
</div>

<div class="container" id="menuDisplay"></div>

<div class="lang-btn" onclick="toggleLang()">English / አማርኛ</div>

<div onclick="openLogin()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; opacity:0;"></div>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>Admin Login</h3><br>
        <input type="text" id="u" placeholder="User" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="p" placeholder="Pass" style="width:100%; padding:10px; margin-bottom:15px;">
        <button onclick="doLogin()" style="width:100%; padding:10px; background:orange; color:white; border:none; border-radius:5px;">Login</button>
        <p onclick="closeLogin()" style="margin-top:10px; font-size:12px; color:gray; cursor:pointer;">Cancel</p>
    </div>
</div>

<div id="adminPanel">
    <div class="admin-header">
        <h2>Menu Manager</h2>
        <button onclick="exitAdmin()" style="border:none; background:none; color:red;">Close</button>
    </div>
    <table id="adminTable">
        <thead><tr><th>Item Name</th><th>Price</th><th>Category</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button class="save-btn" onclick="saveData()">Update Menu Changes</button>
</div>

<script>
    let currentLang = 'en';
    let currentCat = 'breakfast';
    let masterData = {
        en: [
            { id: 1, cat: 'breakfast', title: 'Kitfo Royale', desc: 'Premium minced beef with spiced butter.', price: 500, img: 'b1.jpg' },
            { id: 2, cat: 'breakfast', title: 'Special Omelet', desc: 'Farm eggs with veggies and chili.', price: 350, img: 'b2.jpg' },
            { id: 3, cat: 'breakfast', title: 'Chechebsa', desc: 'Shredded flatbread with honey and butter.', price: 300, img: 'b3.jpg' },
            { id: 4, cat: 'breakfast', title: 'Full Breakfast', desc: 'Eggs, toast, and local beans.', price: 450, img: 'b4.jpg' },
            { id: 5, cat: 'lunchdinner', title: 'Dorowet', desc: 'Traditional spicy chicken stew.', price: 600, img: 'l1.jpg' },
            { id: 6, cat: 'lunchdinner', title: 'Tegabino Shiro', desc: 'Thick chickpea stew in clay pot.', price: 250, img: 'l2.jpg' },
            { id: 7, cat: 'lunchdinner', title: 'Margherita Pizza', desc: 'Fresh tomato and mozzarella.', price: 480, img: 'l3.jpg' },
            { id: 8, cat: 'lunchdinner', title: 'SGS Burger', desc: 'Double beef patty with fries.', price: 550, img: 'l4.jpg' },
            { id: 9, cat: 'beverages', title: 'SGS Macchiato', desc: 'Smooth Ethiopian coffee blend.', price: 60, img: 'd1.jpg' },
            { id: 10, cat: 'beverages', title: 'Fresh Mango Juice', desc: '100% natural organic juice.', price: 120, img: 'd2.jpg' },
            { id: 11, cat: 'beverages', title: 'St. George Beer', desc: 'Cold local premium beer.', price: 150, img: 'd3.jpg' },
            { id: 12, cat: 'beverages', title: 'Coca Cola', desc: 'Chilled soft drink.', price: 80, img: 'd4.jpg' }
        ],
        am: [
            { id: 1, cat: 'breakfast', title: 'ክትፎ', desc: 'በለኩሳ ስጋ እና በቅመም ቅቤ የተዘጋጀ።', price: 500, img: 'b1.jpg' },
            { id: 2, cat: 'breakfast', title: 'ልዩ እንቁላል ፍርፍር', desc: 'በአትክልትና በቃሪያ የተሰራ።', price: 350, img: 'b2.jpg' },
            { id: 3, cat: 'breakfast', title: 'ጨጨብሳ', desc: 'በማርና በቅቤ የተለወሰ።', price: 300, img: 'b3.jpg' },
            { id: 4, cat: 'breakfast', title: 'ቁርስ በሙሉ', desc: 'እንቁላል፣ ዳቦ እና ፉል።', price: 450, img: 'b4.jpg' },
            { id: 5, cat: 'lunchdinner', title: 'ዶሮወጥ', desc: 'ባህላዊ የሀገር ቤት የዶሮ ወጥ።', price: 600, img: 'l1.jpg' },
            { id: 6, cat: 'lunchdinner', title: 'ተጋቢኖ ሽሮ', desc: 'በሸክላ የሚቀርብ ሽሮ።', price: 250, img: 'l2.jpg' },
            { id: 7, cat: 'lunchdinner', title: 'ፒዛ ማርጋሪታ', desc: 'በትኩስ ቲማቲምና ቺዝ የተሰራ።', price: 480, img: 'l3.jpg' },
            { id: 8, cat: 'lunchdinner', title: 'ኤስ ጂ ኤስ በርገር', desc: 'ከቺፕስ ጋር የሚቀርብ።', price: 550, img: 'l4.jpg' },
            { id: 9, cat: 'beverages', title: 'ማኪያቶ', desc: 'የኢትዮጵያ ምርጥ ቡና።', price: 60, img: 'd1.jpg' },
            { id: 10, cat: 'beverages', title: 'የማንጎ ጭማቂ', desc: 'ተፈጥሯዊ ትኩስ ጭማቂ።', price: 120, img: 'd2.jpg' },
            { id: 11, cat: 'beverages', title: 'ቅዱስ ጊዮርጊስ ቢራ', desc: 'ቀዝቃዛ ቢራ።', price: 150, img: 'd3.jpg' },
            { id: 12, cat: 'beverages', title: 'ኮካ ኮላ', desc: 'ቀዝቃዛ ለስላሳ መጠጥ።', price: 80, img: 'd4.jpg' }
        ]
    };

    function render() {
        const list = document.getElementById('menuDisplay');
        list.innerHTML = "";
        const items = masterData[currentLang].filter(i => i.cat === currentCat);
        items.forEach(i => {
            list.innerHTML += `
                <div class="card">
                    <img src="${i.img}" class="food-img">
                    <div class="info">
                        <div class="title">${i.title}</div>
                        <div class="desc">${i.desc}</div>
                        <div class="price">${i.price} ETB</div>
                    </div>
                </div>`;
        });
        document.getElementById('hotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');
    }

    function changeCat(c, el) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en' ? 'am' : 'en');
        render();
    }

    function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    function doLogin() {
        if(document.getElementById('u').value === "admin" && document.getElementById('p').value === "sgs") {
            showAdmin();
            closeLogin();
        } else { alert("Error!"); }
    }

    function showAdmin() {
        document.getElementById('adminPanel').style.display = 'block';
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        masterData.en.forEach((item, idx) => {
            body.innerHTML += `
                <tr>
                    <td><input class="edit-input" value="${item.title}" onchange="updateVal(${idx}, 'title', this.value)"></td>
                    <td><input class="edit-input" value="${item.price}" type="number" onchange="updateVal(${idx}, 'price', this.value)"></td>
                    <td>${item.cat}</td>
                </tr>`;
        });
    }

    function updateVal(idx, key, val) { 
        masterData.en[idx][key] = val; 
    }

    function saveData() { alert("Updated! (Note: Real permanent updates require Firebase/Database connection)"); exitAdmin(); }
    function exitAdmin() { document.getElementById('adminPanel').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
