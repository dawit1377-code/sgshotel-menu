<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER MENU PROFESSIONAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           1. MASTER CONTROL CENTER
           ============================================================
        */
        :root {
            --google-sheet-url: "https://script.google.com/macros/s/AKfycbyLxXSiQjahxWI7_hMuwaQmkinCOMCr462bnITjUa10uAhRuw4liNutxDlcdTMH0yAn7w/exec";
            --hotel-en-1: "DIBORA";
            --hotel-en-2: "JUICE & BURGER";
            --hotel-am-1: "ዲቦራ";
            --hotel-am-2: "ጁስ እና በርገር";
            --header-bg: #616569;
            --word-1-color: #FC6A03;
            --word-2-color: #028A0F;
            --page-bg: #795C34;
            --price-color: #3E5F34;
            --ing-color: #777777;
            --brand-primary: #4F7942;
            --phone-number: "+251954954591";
            --admin-user: "admin";
            --admin-pass: "212121";
        }

        /* --- UI CORE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--page-bg); color: #333; font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif; padding-bottom: 100px; }
        
        #pageLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; }
        .spinner { width: 45px; height: 45px; border: 5px solid #eee; border-top: 5px solid var(--brand-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { background: var(--header-bg); padding: 10px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; height: 130px; }
        .logo-img { height: 80px; width: 80px; object-fit: contain; margin-right: 10px; flex-shrink: 0; }
        .header-center-area { text-align: center; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header h1 { font-family: 'Playfair Display'; font-size: 24px; font-weight: 800; }
        .w1 { color: var(--word-1-color); }
        .w2 { color: var(--word-2-color); }
        
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 10px; background: #fff; position: sticky; top: 130px; z-index: 900; border-bottom: 1px solid #eee; min-height: 195px; scrollbar-width: none; }
        .nav-item { text-align: center; min-width: 150px; opacity: 0.5; cursor: pointer; flex-shrink: 0; border-bottom: 4px solid transparent; }
        .nav-item.active { opacity: 1; font-weight: bold; color: var(--brand-primary); border-bottom-color: var(--brand-primary); }
        .nav-item img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; border: 3px solid #eee; margin-bottom: 8px; }

        .container { padding: 15px; }
        .card { display: flex; align-items: flex-start; background: white; border-radius: 12px; margin-bottom: 15px; padding: 12px; border: 1px solid #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); } 
        .food-img { width: 125px; height: 125px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .food-title { color: var(--brand-primary); font-size: 20px; font-weight: 600; }
        .food-ing { font-size: 14px; color: var(--ing-color); font-style: italic; }
        .price-tag { font-weight: bold; color: var(--price-color); margin-top: 5px; font-size: 18px; }

        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:25px; border-radius:15px; width:92%; max-width:750px; position: relative; }
        #modalImgHD { width: 100%; max-height: 65vh; object-fit: contain; border-radius: 10px; margin-bottom: 15px; display: block; image-rendering: -webkit-optimize-contrast; }
        .close-x { position: absolute; top: 10px; right: 20px; font-size: 35px; cursor: pointer; color: #000; }

        .call-order-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--header-bg); color: white; padding: 16px 35px; border-radius: 50px; text-decoration: none; z-index: 2000; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* ADMIN DASHBOARD */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:15px; overflow-y: auto; }
        .admin-section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 25px; background: #fafafa; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; }
        .price-box { width: 80px; font-weight: bold; text-align: center; border: 2px solid var(--brand-primary); }
    </style>
</head>
<body onclick="APP.closeOnOutside(event)">

<div id="pageLoader">
    <div class="spinner"></div>
    <p style="margin-top:10px; font-size:12px; font-weight:600; color:var(--header-bg)">Connecting...</p>
    <button id="bypassBtn" onclick="APP.hideLoader()" style="margin-top:20px; background:none; border:1px solid #ccc; padding:5px 10px; border-radius:5px; font-size:10px;">Skip Connection</button>
</div>

<header class="header">
    <div onclick="APP.showLogin(event)" style="cursor:pointer; font-size:28px; padding:10px; color:white;">☰</div>
    <img src="logo.png" class="logo-img" alt="" onerror="this.style.display='none'">
    <div class="header-center-area">
        <h1 id="mainTitle"><span class="w1" id="w1"></span> <span class="w2" id="w2"></span></h1>
        <div id="subTitle" style="font-size:12px; font-weight:bold; letter-spacing:3px; color:white;">MENU</div>
        <div id="vatNote" style="font-size:10px; opacity:0.8; margin-top:4px; color:white;"></div>
    </div>
    <button onclick="APP.toggleLang()" style="background:white; color:var(--header-bg); border:none; padding:10px 15px; border-radius:20px; font-weight:bold;">EN/አማ</button>
</header>

<nav class="nav-bar" id="categoryNav"></nav>
<div class="container" id="menuListing"></div>

<div id="itemDetailModal" class="overlay" onclick="APP.closeDetail()">
    <div class="modal" onclick="event.stopPropagation()">
        <span class="close-x" onclick="APP.closeDetail()">&times;</span>
        <img id="modalImgHD" src="">
        <h2 id="modalTitle" style="color:var(--brand-primary);"></h2>
        <p id="modalIng" style="color:var(--ing-color); font-style:italic; margin: 10px 0;"></p>
        <div id="modalPrice" style="color:var(--price-color); font-size:24px; font-weight:bold; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</div>

<a href="#" id="callLink" class="call-order-btn">📞 <span id="callBtnText"></span></a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--header-bg); padding:20px; color:white; border-radius:12px; margin-bottom: 20px;">
        <h3>SGS MANAGER</h3>
        <button onclick="APP.closeAdmin()" style="color:white; border:none; background:none; font-size:40px;">&times;</button>
    </div>
    <div class="admin-section">
        <h4>1. Category Management</h4>
        <div id="adminCatList"></div>
        <button class="btn" style="background:#8e44ad; width:100%; margin-top:15px;" onclick="APP.openModal('catModal')">+ ADD NEW CATEGORY</button>
    </div>
    <div class="admin-section">
        <h4>2. Menu Items Management</h4>
        <button class="btn" style="background:#27ae60; width:100%; margin-bottom:20px;" onclick="APP.openModal('itemModal')">+ ADD NEW FOOD ITEM</button>
        <div style="overflow-x:auto;">
            <table><tbody id="adminItemBody"></tbody></table>
        </div>
    </div>
    <button id="cloudBtn" onclick="APP.saveToCloud()" style="width:100%; padding:22px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">💾 SYNC ALL CHANGES</button>
</div>

<div id="loginOverlay" class="overlay">
    <div class="modal" onclick="event.stopPropagation()" style="text-align:center;">
        <h2 id="loginWelcomeText" style="margin-bottom:15px; color:var(--header-bg);"></h2>
        <input type="text" id="uIn" placeholder="User" autocomplete="off">
        <input type="password" id="pIn" placeholder="Pass" autocomplete="off">
        <button onclick="APP.verifyLogin()" class="btn" style="background:var(--header-bg); width:100%; margin-top:15px;">LOGIN</button>
    </div>
</div>

<div id="editCatModal" class="overlay"><div class="modal" onclick="event.stopPropagation()"><h3>Rename Category</h3><input type="text" id="eCatEn"><input type="text" id="eCatAm"><button onclick="APP.applyCatRename()" class="btn" style="background:#27ae60; width:100%;">SAVE RENAME</button></div></div>
<div id="catModal" class="overlay"><div class="modal" onclick="event.stopPropagation()"><h3>New Category</h3><input type="text" id="nCatId" placeholder="ID"><input type="text" id="nCatEn"><input type="text" id="nCatAm"><input type="file" onchange="APP.handleImg(this)"><button onclick="APP.createNewCat()" class="btn" style="background:#8e44ad; width:100%;">CREATE</button></div></div>
<div id="itemModal" class="overlay"><div class="modal" onclick="event.stopPropagation()"><h3>Add New Item</h3><select id="nItemCat"></select><input type="text" id="nItemEn" placeholder="EN"><input type="text" id="nItemAm" placeholder="AM"><input type="text" id="nItemIng" placeholder="Ingredients"><input type="text" id="nItemPrice" placeholder="Price"><input type="file" onchange="APP.handleImg(this)"><button onclick="APP.createNewItem()" class="btn" style="background:#27ae60; width:100%;">ADD TO MENU</button></div></div>

<script>
    const APP = {
        data: [], cats: [], lang: 'en', activeCat: '', imgTmp: '', editId: null,

        init: async function() {
            // Safety: Hide loader if Sheet doesn't load in 4 seconds
            setTimeout(() => { this.hideLoader(); }, 4000);

            const root = getComputedStyle(document.documentElement);
            const sheetUrl = root.getPropertyValue('--google-sheet-url').trim().replace(/"/g, '');
            document.getElementById('callLink').href = "tel:" + root.getPropertyValue('--phone-number').trim().replace(/"/g, '');
            
            try {
                const r = await fetch(`${sheetUrl}?t=${Date.now()}`);
                const j = await r.json();
                this.data = j.items || [];
                this.cats = j.cats || [];
                if(this.cats.length > 0) this.activeCat = this.cats[0].id;
                this.hideLoader();
                this.render();
            } catch(e) { this.hideLoader(); }
        },

        hideLoader: function() { 
            const l = document.getElementById('pageLoader');
            if(l) l.style.display = 'none'; 
            this.render(); 
        },

        render: function() {
            const isEn = this.lang === 'en';
            const root = getComputedStyle(document.documentElement);
            const hEn = root.getPropertyValue('--hotel-en-1').trim().replace(/"/g, '') + " " + root.getPropertyValue('--hotel-en-2').trim().replace(/"/g, '');
            const hAm = root.getPropertyValue('--hotel-am-1').trim().replace(/"/g, '') + " " + root.getPropertyValue('--hotel-am-2').trim().replace(/"/g, '');

            document.getElementById('w1').innerText = isEn ? root.getPropertyValue('--hotel-en-1').trim().replace(/"/g, '') : root.getPropertyValue('--hotel-am-1').trim().replace(/"/g, '');
            document.getElementById('w2').innerText = isEn ? root.getPropertyValue('--hotel-en-2').trim().replace(/"/g, '') : root.getPropertyValue('--hotel-am-2').trim().replace(/"/g, '');
            document.getElementById('vatNote').innerText = isEn ? "All prices include VAT" : "ሁሉም ዋጋዎች ቫትን ያካትታሉ";
            document.getElementById('callBtnText').innerText = isEn ? "Call To Order" : "ለማዘዝ ይደውሉ";
            document.getElementById('loginWelcomeText').innerText = isEn ? `Welcome to "${hEn}"` : `እንኳን ወደ "${hAm}" በደህና መጡ`;

            document.getElementById('categoryNav').innerHTML = this.cats.map(c => `
                <div class="nav-item ${this.activeCat == c.id ? 'active' : ''}" onclick="APP.setCat('${c.id}')">
                    <img src="${c.img || ''}" onerror="this.src='https://via.placeholder.com/150'">
                    <p>${isEn ? c.en : c.am}</p>
                </div>`).join('');

            const filtered = this.data.filter(i => String(i.cat) === String(this.activeCat) && !i.hidden);
            document.getElementById('menuListing').innerHTML = filtered.map(i => {
                const globalIdx = this.data.indexOf(i);
                return `
                <div class="card" onclick="APP.openDetail(${globalIdx})">
                    <img src="${i.img || ''}" class="food-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div>
                        <div class="food-title">${isEn ? i.en : i.am}</div>
                        <div class="food-ing">${i.ing || ''}</div>
                        <div class="price-tag">${i.price} ETB</div>
                    </div>
                </div>`;
            }).join('');
            this.renderAdmin();
        },

        openDetail: function(idx) {
            const item = this.data[idx];
            document.getElementById('modalImgHD').src = item.img || '';
            document.getElementById('modalTitle').innerText = this.lang === 'en' ? item.en : item.am;
            document.getElementById('modalIng').innerText = item.ing || '';
            document.getElementById('modalPrice').innerText = item.price + " ETB";
            document.getElementById('itemDetailModal').style.display = 'flex';
        },
        closeDetail: function() { document.getElementById('itemDetailModal').style.display = 'none'; },

        renderAdmin: function() {
            document.getElementById('adminCatList').innerHTML = this.cats.map((c, idx) => `
                <div class="cat-row">
                    <div class="cat-info"><span><b>${c.en}</b></span>
                        <button onclick="APP.deleteCat('${c.id}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px;">Del</button>
                    </div>
                    <input type="file" onchange="APP.updateCatImg(${idx}, this)">
                </div>`).join('');

            document.getElementById('adminItemBody').innerHTML = this.data.map((i, idx) => `
                <tr>
                    <td><input value="${i.en}" onchange="APP.data[${idx}].en=this.value"></td>
                    <td><input value="${i.price}" class="price-box" onchange="APP.data[${idx}].price=this.value"></td>
                    <td><button onclick="APP.deleteItem(${idx})">🗑️</button></td>
                </tr>`).join('');
            document.getElementById('nItemCat').innerHTML = this.cats.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
        },

        verifyLogin: function() {
            const root = getComputedStyle(document.documentElement);
            const user = root.getPropertyValue('--admin-user').trim().replace(/"/g, '');
            const pass = root.getPropertyValue('--admin-pass').trim().replace(/"/g, '');
            if(document.getElementById('uIn').value === user && document.getElementById('pIn').value === pass){
                document.getElementById('adminDashboard').style.display='block';
                document.getElementById('uIn').value = ""; document.getElementById('pIn').value = "";
                this.closeModals();
            } else { alert("Error"); }
        },

        setCat: function(id) { this.activeCat = id; this.render(); },
        toggleLang: function() { this.lang = (this.lang === 'en' ? 'am' : 'en'); this.render(); },
        showLogin: function(e) { e.stopPropagation(); document.getElementById('loginOverlay').style.display='flex'; },
        closeAdmin: function() { document.getElementById('adminDashboard').style.display='none'; },
        closeModals: function() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); },
        openModal: function(id) { document.getElementById(id).style.display='flex'; },
        handleImg: function(input) { const r = new FileReader(); r.onload = (e) => this.imgTmp = e.target.result; r.readAsDataURL(input.files[0]); },
        updateCatImg: function(idx, input) { const r = new FileReader(); r.onload = (e) => { this.cats[idx].img = e.target.result; }; r.readAsDataURL(input.files[0]); },
        createNewCat: function() { this.cats.push({id:Date.now(), en:document.getElementById('nCatEn').value, am:document.getElementById('nCatAm').value, img:this.imgTmp}); this.closeModals(); this.render(); },
        createNewItem: function() { this.data.push({id:Date.now(), cat:document.getElementById('nItemCat').value, en:document.getElementById('nItemEn').value, am:document.getElementById('nItemAm').value, ing:document.getElementById('nItemIng').value, price:document.getElementById('nItemPrice').value, img:this.imgTmp, hidden:false}); this.closeModals(); this.render(); },
        deleteItem: function(idx) { if(confirm("Delete Item?")) { this.data.splice(idx, 1); this.render(); } },
        saveToCloud: async function() {
            const root = getComputedStyle(document.documentElement);
            const sheetUrl = root.getPropertyValue('--google-sheet-url').trim().replace(/"/g, '');
            const b = document.getElementById('cloudBtn'); b.innerText = "UPDATING...";
            try {
                await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: this.data, cats: this.cats }) });
                alert("Saved Successfully!"); this.init();
            } catch(e) { alert("Error saving"); } finally { b.innerText = "💾 SYNC ALL CHANGES"; }
        },
        closeOnOutside: function(e) { if(e.target.className==='overlay') this.closeModals(); }
    };
    window.onload = () => APP.init();
</script>
</body>
</html>
