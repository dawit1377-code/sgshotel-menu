<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel - Official Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #2d1b18; --card: #3d2b27; --cream: #fff8e1; --green: #1b3022; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--cream); margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        /* HEADER & MASTER BRANDING */
        header { text-align: center; padding: 25px 10px; border-bottom: 5px solid var(--gold); background: var(--dark); }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .side-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .sgs-text { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; color: var(--green); text-shadow: 2px 2px var(--gold); line-height: 1; }
        .g-btn { background: var(--green); color: var(--gold); width: 55px; height: 55px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; border: 2px dashed var(--gold); font-weight: bold; }
        .hotel-label { background: var(--green); color: var(--gold); padding: 5px 30px; font-weight: 900; letter-spacing: 4px; border-radius: 4px; display: inline-block; margin-top: 10px; border: 1px solid var(--gold); }
        .welcome-note { font-size: 0.85rem; max-width: 300px; margin: 15px auto 0; font-style: italic; line-height: 1.4; opacity: 0.9; }

        /* LANGUAGE SELECTOR ABOVE INPUTS */
        .lang-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0 10px; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .lang-btn.active { background: var(--gold); color: #000; }

        /* INPUTS */
        .loc-area { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 15px; max-width: 450px; margin: 0 auto; }
        .input-box { flex: 1; min-width: 140px; background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); text-align: center; }
        .input-box label { color: var(--gold); font-size: 0.7rem; display: block; font-weight: bold; margin-bottom: 5px; }
        .input-box input { width: 85%; border: none; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 1.1rem; color: #000; }

        /* MENU ITEMS */
        .cat-head { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 1.8rem; margin: 25px 0 10px; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        .item-row { display: flex; align-items: center; background: var(--card); margin: 10px; padding: 12px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); }
        .item-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; border: 1px solid var(--gold); flex-shrink: 0; }
        .item-details { flex: 1; padding: 0 10px; min-width: 0; }
        .item-name { color: var(--gold); font-weight: 600; font-size: 0.95rem; display: block; }
        .qty-container { display: flex; background: #fff; border-radius: 6px; border: 2px solid var(--gold); width: 105px; height: 38px; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .qty-control { background: var(--gold); border: none; width: 32px; height: 100%; font-weight: 900; font-size: 1.4rem; color: #000; cursor: pointer; }
        .qty-num { width: 35px; text-align: center; border: none; font-weight: 900; font-size: 1.1rem; color: #000; background: transparent; }

        /* MODAL & DIRECT SMS BUTTON */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-ui { background: var(--card); width: 85%; max-width: 360px; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; }
        .sms-direct-btn { display: block; background: var(--gold); color: #000 !important; text-decoration: none; padding: 16px; border-radius: 10px; font-weight: 900; margin-top: 15px; font-size: 1.1rem; border: none; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top: 4px solid var(--gold); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <div class="logo-row">
        <img src="logo-left.jpg" class="side-img">
        <div class="sgs-text">S<div class="g-btn">G</div>S</div>
        <img src="logo-right.jpg" class="side-img">
    </div>
    <div class="hotel-label">HOTEL</div>
    <p id="welcome-msg" class="welcome-note">Welcome to SGS Hotel. Please select your choices and we will serve you shortly.</p>
</header>

<div class="lang-container">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
    <button class="lang-btn" id="btn-am" onclick="setLang('am')">አማርኛ</button>
</div>

<div class="loc-area">
    <div class="input-box"><label id="lbl-room">ROOM NO</label><input type="text" id="rm" placeholder="-"></div>
    <div class="input-box"><label id="lbl-table">TABLE NO</label><input type="text" id="tb" placeholder="-"></div>
    <div class="input-box" style="width:100%; min-width:100%; margin-top:10px; border-color: #ff4d4d;">
        <label id="lbl-phone" style="color:#ff4d4d;">PHONE NO (REQUIRED)</label>
        <input type="tel" id="custPhone" placeholder="09........" style="width:90%">
    </div>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <h2 class="cat-head" id="cat-food">Food Items</h2>
    <div id="food-list"></div>
    <h2 class="cat-head" id="cat-drink">Drinks</h2>
    <div id="drink-list"></div>
</div>

<div class="modal-bg" id="confirmBox">
    <div class="modal-ui">
        <h2 id="modal-title" style="color:var(--gold); margin-top:0;">Confirm Order</h2>
        <div id="orderList" style="text-align:left; font-size:0.9rem; margin:15px 0; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;"></div>
        <a id="sms-trigger-link" href="#" class="sms-direct-btn">SEND SMS NOW</a>
        <button onclick="closeModal()" style="background:none; color:var(--gold); border:1px solid var(--gold); width:100%; padding:10px; margin-top:10px; border-radius:8px; font-weight:bold;" id="edit-btn">EDIT</button>
    </div>
</div>

<div class="footer-bar">
    <div style="font-weight:bold; color:var(--gold); font-size:1.1rem;"><span id="lbl-total">Total</span>: <span id="grand">0</span> ETB</div>
    <button style="background:var(--gold); color:#000; border:none; padding:12px 25px; border-radius:8px; font-weight:900;" onclick="openModal()" id="btn-order">ORDER NOW</button>
</div>

<script>
    const trans = {
        en: { welcome: "Welcome to SGS Hotel. Please select your choices and we will serve you shortly.", room: "ROOM NO", table: "TABLE NO", phone: "PHONE NO (REQUIRED)", food: "Food Items", drinks: "Drinks", total: "Total", order: "ORDER NOW", confirm: "Confirm Order", edit: "EDIT", sms: "SEND SMS NOW", errLoc: "Enter Room or Table No!", errItem: "Select items!", errPhone: "Phone number required!" },
        am: { welcome: "እንኳን ወደ ኤስጂኤስ ሆቴል በደህና መጡ። እባክዎ ምርጫዎን ይምረጡ።", room: "ክፍል ቁጥር", table: "ጠረጴዛ ቁጥር", phone: "ስልክ ቁጥር (ግዴታ)", food: "ምግቦች", drinks: "መጠጦች", total: "ጠቅላላ", order: "አሁን እዘዝ", confirm: "ትዕዛዝዎን ያረጋግጡ", edit: "አስተካክል", sms: "በአጭር መልዕክት ላክ", errLoc: "እባክዎ የክፍል ወይም የጠረጴዛ ቁጥር ያስገቡ!", errItem: "እባክዎ ንጥሎችን ይምረጡ!", errPhone: "እባክዎ የስልክ ቁጥርዎን ያስገቡ!" }
    };

    let curLang = 'en';
    function setLang(l) {
        curLang = l;
        const t = trans[l];
        document.getElementById('welcome-msg').innerText = t.welcome;
        document.getElementById('lbl-room').innerText = t.room;
        document.getElementById('lbl-table').innerText = t.table;
        document.getElementById('lbl-phone').innerText = t.phone;
        document.getElementById('cat-food').innerText = t.food;
        document.getElementById('cat-drink').innerText = t.drinks;
        document.getElementById('lbl-total').innerText = t.total;
        document.getElementById('btn-order').innerText = t.order;
        document.getElementById('modal-title').innerText = t.confirm;
        document.getElementById('edit-btn').innerText = t.edit;
        document.getElementById('sms-trigger-link').innerText = t.sms;
        
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
        document.getElementById('btn-am').classList.toggle('active', l === 'am');
    }

    const foods = [{n:"Beyayentu", p:450, img:"beyayentu.jpg"}, {n:"Egg Sandwich", p:280, img:"egg-sandwich.jpg"}, {n:"Pizza Margarita", p:550, img:"pizza.jpg"}, {n:"Shiro Tegabino", p:350, img:"tegabino.jpg"}, {n:"Special Burger", p:650, img:"burger.jpg"}];
    const drinks = [{n:"Bottled Water", p:60, img:"water.jpg"}, {n:"Tea", p:80, img:"tea.jpg"}, {n:"Machiato", p:120, img:"macchiato.jpg"}, {n:"American Coffee", p:110, img:"americano.jpg"}, {n:"Soft Drinks", p:90, img:"soda.jpg"}];

    function build(data, id) {
        let h = "";
        data.forEach(x => {
            h += `<div class="item-row">
                <input type="checkbox" class="chk" style="width:24px; height:24px;" onchange="calc()">
                <img src="${x.img}" class="item-img" style="margin: 0 10px;">
                <div class="item-details">
                    <span class="item-name">${x.n}</span>
                    <span class="item-price" data-p="${x.p}" style="font-weight:bold;">${x.p} ETB</span>
                </div>
                <div class="qty-container">
                    <button class="qty-control" onclick="q(this,-1)">-</button>
                    <input type="number" class="qty-num" value="1" readonly>
                    <button class="qty-control" onclick="q(this,1)">+</button>
                </div>
            </div>`;
        });
        document.getElementById(id).innerHTML = h;
    }
    build(foods, "food-list"); build(drinks, "drink-list");

    function q(b, n) { let i = b.parentElement.querySelector('.qty-num'); let v = parseInt(i.value) + n; if(v < 1) v = 1; i.value = v; calc(); }
    function calc() {
        let t = 0;
        document.querySelectorAll('.item-row').forEach(row => { if(row.querySelector('.chk').checked) { t += parseInt(row.querySelector('.item-price').dataset.p) * parseInt(row.querySelector('.qty-num').value); } });
        document.getElementById('grand').innerText = t;
    }

    function openModal() {
        let r = document.getElementById('rm').value.trim();
        let b = document.getElementById('tb').value.trim();
        let p = document.getElementById('custPhone').value.trim();
        if(!r && !b) { alert(trans[curLang].errLoc); return; }
        if(!p) { alert(trans[curLang].errPhone); return; }
        
        let list = ""; let msg = ""; let total = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            if(row.querySelector('.chk').checked) {
                let n = row.querySelector('.item-name').innerText;
                let v = row.querySelector('.qty-num').value;
                list += `• ${v}x ${n}<br>`;
                msg += `${v}x${n}, `;
                total += (parseInt(row.querySelector('.item-price').dataset.p) * parseInt(v));
            }
        });

        if(total === 0) { alert(trans[curLang].errItem); return; }
        document.getElementById('orderList').innerHTML = list + `<br><b>TOTAL: ${total} ETB</b>`;
        
        // SMS LINK GENERATION
        const managerPhone = "0954954591";
        const isiOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        const fullMsg = `SGS Order: ${msg}Total:${total}ETB. Loc:${r||b}. CustPh:${p}`;
        document.getElementById('sms-trigger-link').href = `sms:${managerPhone}${isiOS ? '&' : '?'}body=${encodeURIComponent(fullMsg)}`;
        
        document.getElementById('confirmBox').style.display = 'flex';
    }

    function closeModal() { document.getElementById('confirmBox').style.display = 'none'; }
    setLang('en');
</script>
</body>
</html>
