<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #4F7942; --dark-green: #3E5F34; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        /* Title increased by 25% (from 20px to 25px) */
        .header { background: var(--dark-green); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 110px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 25px; text-align: center; }
        
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 110px; z-index: 900; border-bottom: 1px solid #eee; }
        .nav-item { text-align: center; min-width: 110px; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.05); font-weight: bold; }
        .nav-item img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; margin-bottom: 5px; }
        
        .container { padding: 12px; min-height: 60vh; }
        .card { display: flex; align-items: center; background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .food-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
        
        /* Bilingual Titles display */
        .title-group { display: flex; flex-direction: column; }
        .title-en { color: var(--p-green); font-size: 17px; font-weight: 600; }
        .title-am { color: #555; font-size: 14px; margin-top: -2px; }
        
        .call-order-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark-green); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; z-index: 2000; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y: auto; }
        .admin-section { border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; max-height: 90vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        input, select { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<header class="header">
    <div onclick="showLogin()" style="cursor:pointer; font-size:24px;">☰</div>
    <div style="text-align:center; flex-grow:1;">
        <h1>SGS HOTEL</h1>
        <span style="font-size:10px; letter-spacing:2px;">MENU / ሜኑ</span>
        <div id="vatNote" style="font-size:9px; font-style:italic; opacity:0.9;">All Price inclusive of VAT / ሁሉም ዋጋ ታክስ ያካትታል</div>
    </div>
    <div style="width:40px;"></div> </header>

<nav class="nav-bar" id="categoryNav"></nav>
<div class="container" id="menuListing"><p style="text-align:center; margin-top:50px;">Syncing Menu...</p></div>

<a href="tel:+251954954591" class="call-order-btn">📞 Call To Order / ለመዘዝ ይደውሉ</a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-green); padding:15px; color:white; border-radius:10px;">
        <h3>SGS MANAGER</h3>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:30px;">×</button>
    </div>

    <div class="admin-section" style="margin-top:20px;">
        <h4>1. Category Manager</h4>
        <div id="adminCatList" style="display:flex; overflow-x:auto; gap:10px; margin:10px 0;"></div>
        <button class="btn" style="background:#8e44ad; width:100%;" onclick="openCatModal()">+ Add New Category</button>
    </div>

    <div class="admin-section">
        <h4>2. Bulk Edit Items</h4>
        <button class="btn" style="background:#27ae60; margin-bottom:10px;" onclick="openItemModal()">+ Add New Food Item</button>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr style="background:#f9f9f9;"><th>Names (EN/AM)</th><th>Price</th><th>Category</th><th>Action</th></tr></thead>
                <tbody id="adminItemBody"></tbody>
            </table>
        </div>
    </div>

    <button id="cloudBtn" onclick="saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold;">💾 SYNC UPDATES TO ALL DEVICES</button>
</div>

<div id="catModal" class="overlay"><div class="modal">
    <h3>New Category</h3>
    <input type="text" id="catId" placeholder="Category ID (e.g. pizza)">
    <input type="text" id="catEn" placeholder="English Name">
    <input type="text" id="catAm" placeholder="Amharic Name">
    <input type="file" onchange="processFile(this)">
    <button onclick="addCategory()" class="btn" style="background:#8e44ad; width:100%; margin-top:10px;">Create Category</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="itemModal" class="overlay"><div class="modal">
    <h3>New Item</h3>
    <select id="itemCatSelect"></select>
    <input type="text" id="itemEn" placeholder="English Name">
    <input type="text" id="itemAm" placeholder="Amharic Name">
    <input type="text" id="itemIng" placeholder="Ingredients">
    <input type="number" id="itemPrice" placeholder="Price">
    <input type="file" onchange="processFile(this)">
    <button onclick="addItem()" class="btn" style="background:#27ae60; width:100%; margin-top:10px;">Add Item</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" style="text-align:center;">
    <h3>STAFF LOGIN</h3>
    <input type="text" id="userInput" placeholder="Username">
    <input type="password" id="passInput" placeholder="Password">
    <button onclick="handleLogin()" class="btn" style="background:var(--dark-green); width:100%; margin-top:10px;">LOGIN</button>
    <button onclick="closeModals()" class="btn" style="background:none; color:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzUs_R4tSRSWfZN5WWwoUa1_8qxHbs95fQk83xDwd9TZ9wzGnlxxLuEmFpTgfaZ2aKOnA/exec";
    let data = [], categories = [], currentCat = '', tempImg = "";

    // Force fetch every time the page loads for perfect multi-device sync
    async function fetchData() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "<p style='text-align:center; padding-top:40px;'>Updating Menu Content...</p>";
        
        try {
            const res = await fetch(`${SHEET_URL}?t=${new Date().getTime()}`); // Cache buster
            const json = await res.json();
            data = json.items || [];
            categories = json.cats || [];
            if(categories.length > 0 && !currentCat) currentCat = categories[0].id;
            renderAll();
        } catch (e) {
            list.innerHTML = "<p style='text-align:center; color:red;'>Sync Error. Please check connection.</p>";
        }
    }

    function renderAll() {
        // Render Categories
        const nav = document.getElementById('categoryNav');
        nav.innerHTML = categories.map(c => `
            <div class="nav-item ${currentCat === c.id ? 'active' : ''}" onclick="setCat('${c.id}')">
                <img src="${c.img || 'https://via.placeholder.com/80'}">
                <p style="font-size:11px;">${c.en}<br>${c.am}</p>
            </div>`).join('');

        // Render Menu Cards with both languages visible
        const list = document.getElementById('menuListing');
        list.innerHTML = data.filter(i => i.cat === currentCat && !i.hidden).map(i => `
            <div class="card">
                <img src="${i.img}" class="food-img">
                <div class="info">
                    <div class="title-group">
                        <span class="title-en">${i.en}</span>
                        <span class="title-am">${i.am}</span>
                    </div>
                    <p style="font-size:11px; color:gray; font-style:italic;">${i.ing || ''}</p>
                    <p style="font-weight:bold; margin-top:5px; color:var(--dark-green);">${i.price} ETB</p>
                </div>
            </div>`).join('');
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('adminCatList').innerHTML = categories.map(c => `
            <div style="min-width:80px; text-align:center; border:1px solid #ddd; padding:5px; border-radius:5px;">
                <p style="font-size:9px;">${c.en}</p>
                <button onclick="removeCat('${c.id}')" style="color:red; border:none; background:none; font-size:10px;">Remove</button>
            </div>`).join('');

        document.getElementById('adminItemBody').innerHTML = data.map((i, idx) => `
            <tr style="${i.hidden ? 'opacity:0.4' : ''}">
                <td>
                    <input value="${i.en}" onchange="data[${idx}].en=this.value" placeholder="EN Name">
                    <input value="${i.am}" onchange="data[${idx}].am=this.value" placeholder="AM Name">
                    <input value="${i.ing || ''}" onchange="data[${idx}].ing=this.value" placeholder="Ingredients">
                </td>
                <td><input type="number" value="${i.price}" onchange="data[${idx}].price=this.value" style="width:60px;"></td>
                <td>
                    <select onchange="data[${idx}].cat=this.value">
                        ${categories.map(c => `<option value="${c.id}" ${i.cat === c.id ? 'selected' : ''}>${c.en}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <button onclick="toggleHide(${idx})" class="btn" style="background:#444; margin-bottom:2px; width:100%;">${i.hidden?'Show':'Hide'}</button>
                    <button onclick="removeItem(${idx})" class="btn" style="background:red; width:100%;">Del</button>
                </td>
            </tr>`).join('');
        document.getElementById('itemCatSelect').innerHTML = categories.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
    }

    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") {
            alert("Welcome To SGS Hotel Admin");
            document.getElementById('adminDashboard').style.display = 'block';
            closeModals();
        } else { alert("Login Failed"); }
    }

    async function saveToCloud() {
        const btn = document.getElementById('cloudBtn');
        btn.innerText = "⏳ PUSHING UPDATES..."; btn.disabled = true;
        try {
            await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: data, cats: categories }) });
            alert("Updates pushed! All devices will see changes on next refresh.");
            closeAdmin();
            fetchData();
        } catch (e) { alert("Sync Error"); }
        finally { btn.innerText = "💾 SYNC UPDATES TO ALL DEVICES"; btn.disabled = false; }
    }

    function processFile(input) { 
        const reader = new FileReader(); 
        reader.onload = (e) => { tempImg = e.target.result; }; 
        if(input.files[0]) reader.readAsDataURL(input.files[0]); 
    }

    function setCat(c) { currentCat = c; renderAll(); }
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
    function closeAdmin() { 
        document.getElementById('adminDashboard').style.display = 'none';
        document.getElementById('userInput').value = ""; // Remove credentials
        document.getElementById('passInput').value = "";
    }
    function toggleHide(idx) { data[idx].hidden = !data[idx].hidden; renderAdmin(); }
    function removeItem(idx) { if(confirm("Delete item?")) { data.splice(idx, 1); renderAdmin(); } }
    function removeCat(id) { if(confirm("Delete category?")) { categories = categories.filter(c => c.id !== id); renderAll(); } }
    function addCategory() { categories.push({id: document.getElementById('catId').value, en: document.getElementById('catEn').value, am: document.getElementById('catAm').value, img: tempImg}); renderAll(); closeModals(); }
    function addItem() { data.push({id: Date.now(), cat: document.getElementById('itemCatSelect').value, en: document.getElementById('itemEn').value, am: document.getElementById('itemAm').value, ing: document.getElementById('itemIng').value, price: document.getElementById('itemPrice').value, img: tempImg, hidden: false}); renderAll(); closeModals(); }

    fetchData();
</script>
</body>
</html>
