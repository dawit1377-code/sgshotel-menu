<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-orange: #E67E22; --dark-orange: #D35400; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-overflow-scrolling: touch; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; }
        .lang-am { font-family: 'Noto Sans Ethiopic', sans-serif; }

        /* 1 & 2. Slim Header with Dark Orange & Subtitle */
        .header { 
            background: var(--dark-orange);
            color: white; 
            padding: 8px 15px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .hotel-brand { text-align: center; flex-grow: 1; }
        .hotel-brand h1 { font-family: 'Playfair Display', serif; font-size: 19px; line-height: 1; }
        .hotel-brand span { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #ffe0b2; }

        .menu-icon { font-size: 22px; cursor: pointer; color: white; width: 40px; }
        .top-spacer { width: 40px; } /* Balancing element */

        /* Categories */
        .nav-bar { 
            display: flex; overflow-x: auto; padding: 12px 5px; 
            background: #fff; position: sticky; top: 48px; z-index: 900; 
            border-bottom: 1px solid #eee;
        }
        .nav-item { text-align: center; min-width: 120px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.05); }
        .nav-item img { 
            width: 75px; height: 75px; 
            border-radius: 50%; display: block; margin: 0 auto 5px; 
            border: 2px solid #f0f0f0; object-fit: cover; 
            will-change: transform; /* 6. Speed Optimization */
        }
        .nav-item.active img { border-color: var(--p-orange); }

        /* 3 & 5. Ingredients & Orange Numbers */
        .container { padding: 10px; }
        .card { 
            display: flex; align-items: center; background: white; border-radius: 12px; 
            margin-bottom: 12px; padding: 10px; border: 1px solid #f2f2f2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            content-visibility: auto; /* 6. Major Speed Optimization */
        }
        .food-img { 
            width: 100px; height: 100px; 
            border-radius: 10px; object-fit: cover; margin-right: 15px;
            image-rendering: -webkit-optimize-contrast; 
        }
        .info .title { font-size: 16px; font-weight: 600; color: var(--p-orange); }
        .info .ingred { font-size: 11px; color: #777; font-style: italic; margin-top: 2px; line-height: 1.2; }
        .info .price { font-size: 15px; font-weight: 700; color: var(--p-orange); margin-top: 4px; } /* 3. Orange Numbers */

        /* Admin Management UI */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y:auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .edit-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

        /* Overlays */
        #welcomeNote {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--dark-orange); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 5000; font-weight: 600;
        }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2500; align-items:center; justify-content:center; }
        .login-card { background:white; padding:25px; border-radius:12px; width:85%; max-width:300px; text-align:center; }
    </style>
</head>
<body id="bodyTag">

<header class="header">
    <div class="menu-icon" onclick="showLogin()">☰</div>
    <div class="hotel-brand">
        <h1 id="displayHotelName">SGS HOTEL</h1>
        <span>MENU</span>
    </div>
    <div class="lang-toggle-box">
        <button class="lang-btn" onclick="toggleLang()" style="border:none; background:white; color:var(--dark-orange); padding:3px 8px; border-radius:10px; font-size:10px; font-weight:bold;">EN/አማ</button>
    </div>
</header>

<div id="welcomeNote"><h1>WELCOME</h1><p>SGS Hotel Admin System</p></div>

<nav class="nav-bar">
    <div class="nav-item active" id="cat-breakfast" onclick="changeCat('breakfast')">
        <img src="b1.jpg" loading="lazy"><span id="nav-text-break">Breakfast</span>
    </div>
    <div class="nav-item" id="cat-lunchdinner" onclick="changeCat('lunchdinner')">
        <img src="l1.jpg" loading="lazy"><span id="nav-text-lunch">Lunch/Dinner</span>
    </div>
    <div class="nav-item" id="cat-beverages" onclick="changeCat('beverages')">
        <img src="d1.jpg" loading="lazy"><span id="nav-text-bev">Beverages</span>
    </div>
</nav>

<div class="container" id="menuListing"></div>

<div id="loginOverlay" class="overlay">
    <div class="login-card">
        <h3 style="color:var(--dark-orange)">ADMIN LOGIN</h3><br>
        <input type="text" id="userInput" placeholder="User" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="passInput" placeholder="Pass" style="width:100%; padding:10px; margin-bottom:15px;">
        <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--dark-orange); color:white; border:none; border-radius:5px;">LOGIN</button>
        <p onclick="hideLogin()" style="margin-top:10px; color:gray; cursor:pointer; font-size:12px;">Close</p>
    </div>
</div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-orange); padding:10px; color:white;">
        <h4>MENU MANAGER</h4>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:24px;">×</button>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>Name (EN)</th><th>Ingredients</th><th>Price</th><th>Images</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button onclick="saveAndClear()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; margin-top:15px;">SAVE MENU</button>
</div>

<script>
    let currentLang = 'en';
    let currentCat = 'breakfast';
    
    let data = [
        { id: 1, cat: 'breakfast', en: 'Kitfo Royale', am: 'ክትፎ ሮያል', price: 500, img: 'b1.jpg', ing: 'Minced beef, nitir kibe, mitmita' },
        { id: 2, cat: 'breakfast', en: 'Special Omelet', am: 'ልዩ እንቁላል', price: 350, img: 'b2.jpg', ing: 'Eggs, onions, green pepper, tomato' },
        { id: 5, cat: 'lunchdinner', en: 'Golden Dorowet', am: 'ወርቃማው ዶሮወጥ', price: 600, img: 'l1.jpg', ing: 'Chicken stew, boiled eggs, spices' },
        { id: 9, cat: 'beverages', en: 'SGS Macchiato', am: 'ማኪያቶ', price: 60, img: 'd1.jpg', ing: 'Premium espresso, steamed milk' }
    ];

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        document.getElementById('displayHotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');
        
        data.filter(i => i.cat === currentCat).forEach(item => {
            list.innerHTML += `<div class="card">
                <img src="${item.img}" class="food-img" loading="lazy" onerror="this.src='https://via.placeholder.com/100'">
                <div class="info">
                    <div class="title">${currentLang === 'en' ? item.en : item.am}</div>
                    <div class="ingred">${item.ing}</div>
                    <div class="price">${item.price} ETB</div>
                </div>
            </div>`;
        });
        document.getElementById('bodyTag').className = (currentLang === 'am' ? 'lang-am' : '');
    }

    function changeCat(c) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('cat-'+c).classList.add('active');
        render();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en' ? 'am' : 'en');
        render();
    }

    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") {
            hideLogin();
            document.getElementById('welcomeNote').style.display = 'block';
            setTimeout(() => { document.getElementById('welcomeNote').style.display = 'none'; openAdmin(); }, 1200);
        } else { alert("Error"); }
    }

    function openAdmin() {
        document.getElementById('adminDashboard').style.display = 'block';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td><input class="edit-input" value="${item.en}" onchange="editItem(${index}, 'en', this.value)"></td>
                <td><input class="edit-input" value="${item.ing}" onchange="editItem(${index}, 'ing', this.value)"></td>
                <td><input class="edit-input" type="number" value="${item.price}" onchange="editItem(${index}, 'price', this.value)"></td>
                <td><input type="file" onchange="uploadImg(${index}, this)"></td>
            </tr>`;
        });
    }

    function uploadImg(idx, input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { data[idx].img = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function editItem(idx, key, val) { data[idx][key] = val; }
    function saveAndClear() { alert("Saved!"); closeAdmin(); }
    function closeAdmin() { document.getElementById('adminDashboard').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
