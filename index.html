<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel - Luxury Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #2d1b18; --card: #3d2b27; --cream: #fff8e1; --green: #1b3022; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--cream); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        header { text-align: center; padding: 25px 10px; border-bottom: 5px solid var(--gold); background: var(--dark); }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .side-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .sgs-text { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; color: var(--green); text-shadow: 2px 2px var(--gold); line-height: 1; }
        .g-btn { background: var(--green); color: var(--gold); width: 55px; height: 55px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; border: 2px dashed var(--gold); font-weight: bold; }
        .hotel-label { background: var(--green); color: var(--gold); padding: 5px 30px; font-weight: 900; letter-spacing: 4px; border-radius: 4px; display: inline-block; margin-top: 10px; border: 1px solid var(--gold); }
        .welcome-note { font-size: 0.85rem; max-width: 300px; margin: 15px auto 0; font-style: italic; line-height: 1.4; opacity: 0.9; }
        .luxury-title { color: var(--gold); font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: 4px; font-size: 1.3rem; margin-top: 15px; text-transform: uppercase; }

        .lang-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0 20px; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: var(--gold); color: #000; }

        /* CLEAN ITEM CARDS */
        .cat-head { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 1.8rem; margin: 25px 0 10px; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        .item-row { display: flex; align-items: center; background: var(--card); margin: 12px; padding: 15px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); transition: 0.3s; }
        .item-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid var(--gold); flex-shrink: 0; }
        .item-details { flex: 1; padding-left: 15px; }
        .item-name { color: var(--gold); font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .item-price { color: var(--cream); font-weight: 400; font-size: 1rem; opacity: 0.9; }

        /* CALL BUTTON FOOTER */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 25px; text-align: center; border-top: 4px solid var(--gold); z-index: 1000; }
        .call-btn { display: inline-block; background: var(--gold); color: #000 !important; text-decoration: none; padding: 15px 50px; border-radius: 30px; font-weight: 900; font-size: 1.3rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <div class="logo-row">
        <img src="logo-left.jpg" class="side-img">
        <div class="sgs-text">S<div class="g-btn">G</div>S</div>
        <img src="logo-right.jpg" class="side-img">
    </div>
    <div class="hotel-label">HOTEL</div>
    <p id="welcome-msg" class="welcome-note">Welcome to SGS Hotel. Browse our selection and press the button below to call for your order.</p>
    <div class="luxury-title">Luxury Menu</div>
</header>

<div class="lang-container">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
    <button class="lang-btn" id="btn-am" onclick="setLang('am')">አማርኛ</button>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <h2 class="cat-head" id="cat-food">Food</h2>
    <div id="food-list"></div>
    <h2 class="cat-head" id="cat-drink">Drinks</h2>
    <div id="drink-list"></div>
</div>

<div class="footer-bar">
    <a href="tel:+251954954591" class="call-btn" id="call-text">CALL TO ORDER</a>
</div>

<script>
    const trans = {
        en: { welcome: "Welcome to SGS Hotel. Browse our selection and press the button below to call for your order.", food: "Food Items", drinks: "Drinks", call: "CALL TO ORDER" },
        am: { welcome: "እንኳን ወደ ኤስጂኤስ ሆቴል በደህና መጡ። እባክዎ ምርጫዎን ይመልከቱ እና ትዕዛዝ ለመስጠት ከታች ያለውን ቁልፍ በመጫን ይደውሉ።", food: "ምግቦች", drinks: "መጠጦች", call: "ለመዘዝ ይደውሉ" }
    };

    function setLang(l) {
        const t = trans[l];
        document.getElementById('welcome-msg').innerText = t.welcome;
        document.getElementById('cat-food').innerText = t.food;
        document.getElementById('cat-drink').innerText = t.drinks;
        document.getElementById('call-text').innerText = t.call;
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
        document.getElementById('btn-am').classList.toggle('active', l === 'am');
    }

    const foods = [{n:"Beyayentu", p:450, img:"beyayentu.jpg"}, {n:"Egg Sandwich", p:280, img:"egg-sandwich.jpg"}, {n:"Pizza Margarita", p:550, img:"pizza.jpg"}, {n:"Shiro Tegabino", p:350, img:"tegabino.jpg"}, {n:"Special Burger", p:650, img:"burger.jpg"}];
    const drinks = [{n:"Bottled Water", p:60, img:"water.jpg"}, {n:"Tea", p:80, img:"tea.jpg"}, {n:"Machiato", p:120, img:"macchiato.jpg"}, {n:"American Coffee", p:110, img:"americano.jpg"}, {n:"Soft Drinks", p:90, img:"soda.jpg"}];

    function build(data, id) {
        let h = "";
        data.forEach(x => {
            h += `<div class="item-row">
                <img src="${x.img}" class="item-img">
                <div class="item-details">
                    <span class="item-name">${x.n}</span>
                    <span class="item-price">${x.p} ETB</span>
                </div>
            </div>`;
        });
        document.getElementById(id).innerHTML = h;
    }
    build(foods, "food-list"); build(drinks, "drink-list");
</script>
</body>
</html>
