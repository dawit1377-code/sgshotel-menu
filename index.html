<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --p-orange: #4F7942;    /* Fern Green */
            --dark-orange: #3E5F34; /* Darker Fern Green */
            --bg: #ffffff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; overscroll-behavior-y: contain; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        .header { background: var(--dark-orange); color: white; padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 90px; }
        .hotel-brand { text-align: center; flex-grow: 1; min-width: 200px; }
        .hotel-brand h1 { font-family: 'Playfair Display', serif; font-size: 22px; line-height: 1; }
        .hotel-brand span { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #e8f5e9; display: block; margin-top: 2px; }
        .vat-main { font-size: 11px; color: #fff; opacity: 0.9; font-style: italic; display: block; margin-top: 4px; white-space: nowrap; width: 100%; }
        .menu-icon { font-size: 24px; cursor: pointer; color: white; width: 40px; }
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 90px; z-index: 900; border-bottom: 1px solid #eee; }
        .nav-item { text-align: center; min-width: 150px; opacity: 0.5; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.05); }
        .nav-item img { width: 113px; height: 113px; border-radius: 50%; display: block; margin: 0 auto 8px; border: 3px solid #f0f0f0; object-fit: cover; }
        .container { padding: 12px; min-height: 60vh; }
        .card { display: flex; align-items: center; background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .food-img { width: 138px; height: 138px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #eee; }
        .info .title { font-size: 18px; font-weight: 600; color: var(--p-orange); font-family: 'Noto Sans Ethiopic', sans-serif; }
        .info .ingred { font-size: 12px; color: #777; font-style: italic; margin-top: 2px; font-family: 'Noto Sans Ethiopic', sans-serif; }
        .info .price { font-size: 17px; font-weight: 700; color: var(--dark-orange); margin-top: 5px; }
        .call-order-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark-orange); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 2000; display: flex; align-items: center; gap: 10px; font-size: 16px; min-width: 200px; justify-content: center; }

        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y: scroll; }
        .action-btn { flex: 1; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #eee; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .hidden-row { background: #f9f9f9; opacity: 0.6; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<header class="header">
    <div class="menu-icon" onclick="showLogin()">☰</div>
    <div class="hotel-brand">
        <h1 id="displayHotelName">SGS HOTEL</h1>
        <span id="menu-label">MENU</span>
        <span class="vat-main" id="vat-text">All Price Is inclusive of VAT</span>
    </div>
    <button onclick="toggleLang()" style="border:none; background:white; color:var(--dark-orange); padding:5px 8px; border-radius:15px; font-size:11px; font-weight:bold; min-width:60px;">EN/አማ</button>
</header>

<nav class="nav-bar" id="categoryNav"></nav>

<div class="container" id="menuListing"></div>

<a href="tel:+251954954591" class="call-order-btn">📞 <span id="callText">Call To Order</span></a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-orange); padding:15px; color:white;">
        <h3 id="adminWelcome">SGS MANAGER</h3>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:30px;">×</button>
    </div>
    
    <div style="padding:10px; border:1px solid #eee; margin-top:10px; border-radius:8px;">
        <h4 style="font-size:12px; margin-bottom:5px;">CATEGORY MANAGEMENT</h4>
        <div style="display:flex; gap:5px;">
            <button class="action-btn" style="background:#8e44ad" onclick="openCatModal()">📁 ADD CATEGORY</button>
            <button class="action-btn" style="background:#34495e" onclick="toggleDeleteCatMode()">🗑️ REMOVE CAT</button>
        </div>
    </div>

    <div style="display:flex; gap:5px; margin-top:15px;">
        <button class="action-btn" style="background:#27ae60" onclick="openAddModal()">➕ ADD ITEM</button>
        <button class="action-btn" style="background:#2980b9" onclick="toggleMoveMode()">🔄 MOVE</button>
        <button class="action-btn" style="background:#f39c12" onclick="toggleHideMode()">👁️ HIDE/SHOW</button>
        <button class="action-btn" style="background:#c0392b" onclick="toggleDeleteMode()">🗑️ DELETE ITEM</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>EN Name</th><th>AM Name</th><th>Ingredients</th><th>Price</th><th>Photo</th><th id="actionHeader" style="display:none">Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button id="cloudBtn" onclick="saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">💾 SAVE & SYNC TO GOOGLE SHEETS</button>
</div>

<div id="catModal" class="overlay"><div class="modal">
    <h3>New Category</h3>
    <input type="text" id="catId" placeholder="Category ID (e.g. pizza)">
    <input type="text" id="catNameEn" placeholder="Category Name (English)">
    <input type="text" id="catNameAm" placeholder="Category Name (Amharic)">
    <input type="file" onchange="processCatFile(this)">
    <button onclick="submitNewCategory()" style="width:100%; padding:15px; background:#8e44ad; color:white; border:none; border-radius:8px; margin-top:10px;">ADD CATEGORY</button>
    <button onclick="closeCatModal()" style="width:100%; border:none; background:none; color:red; margin-top:10px;">Cancel</button>
</div></div>

<div id="addModal" class="overlay"><div class="modal">
    <h3>New Item</h3>
    <select id="newCat"></select>
    <input type="text" id="newEn" placeholder="English Name">
    <input type="text" id="newAm" placeholder="Amharic Name">
    <input type="text" id="newIng" placeholder="Ingredients">
    <input type="number" id="newPrice" placeholder="Price">
    <input type="file" onchange="processFile(this)">
    <button onclick="submitNewItem()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; margin-top:10px;">ADD ITEM</button>
    <button onclick="closeAddModal()" style="width:100%; border:none; background:none; color:red; margin-top:10px;">Cancel</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" style="text-align:center;">
    <h3>STAFF LOGIN</h3>
    <input type="text" id="userInput" placeholder="User">
    <input type="password" id="passInput" placeholder="Pass">
    <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--dark-orange); color:white; border:none; border-radius:8px; margin-top:10px;">LOGIN</button>
    <button onclick="hideLogin()" style="width:100%; border:none; background:none; color:gray; margin-top:10px;">Cancel</button>
</div></div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbyxbvzzSvZM_G9UciwMLx98dS0lS2MLlyPBiCHsU3wd2R5BLYMTFowifz4isPGcVid-qw/exec";
    
    let currentLang = 'en', currentCat = 'breakfast', adminMode = 'none', data = [], categories = [], tempImgBase64 = "", tempCatImg = "";

    async function fetchMenu() {
        try {
            const response = await fetch(SHEET_URL);
            const result = await response.json();
            // Assuming sheet has a way to distinguish cat rows or they are just items. 
            // For this logic, we will extract unique categories from items or use a default set.
            data = result;
            if(categories.length === 0) {
                categories = [
                    {id: 'breakfast', en: 'Breakfast', am: 'ቁርስ', img: 'https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?q=80&w=300'},
                    {id: 'lunchdinner', en: 'Lunch/Dinner', am: 'ምሳ እና እራት', img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=300'},
                    {id: 'beverages', en: 'Beverages', am: 'መጠጦች', img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=300'}
                ];
            }
            renderNav();
            render();
            if(document.getElementById('adminDashboard').style.display === 'block') refreshAdminTable();
        } catch (e) { console.error(e); }
    }

    function renderNav() {
        const nav = document.getElementById('categoryNav');
        const isEn = currentLang === 'en';
        nav.innerHTML = "";
        categories.forEach(cat => {
            nav.innerHTML += `
                <div class="nav-item ${currentCat === cat.id ? 'active' : ''}" id="cat-${cat.id}" onclick="changeCat('${cat.id}')">
                    <img src="${cat.img}">
                    <span>${isEn ? cat.en : cat.am}</span>
                </div>`;
        });
        
        // Update Select Dropdown in Add Modal
        const select = document.getElementById('newCat');
        select.innerHTML = "";
        categories.forEach(cat => {
            select.innerHTML += `<option value="${cat.id}">${cat.en}</option>`;
        });
    }

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        const isEn = currentLang === 'en';
        document.getElementById('displayHotelName').innerText = isEn ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል';
        document.getElementById('menu-label').innerText = isEn ? 'MENU' : 'ሜኑ';
        document.getElementById('vat-text').innerText = isEn ? 'All Price Is inclusive of VAT' : 'ሁሉም ዋጋ የተጨማሪ እሴት ታክስ (VAT) ያካትታል';
        document.getElementById('callText').innerText = isEn ? 'Call To Order' : 'ለመዘዝ ይደውሉ';
        
        data.filter(i => i.cat === currentCat && !i.hidden).forEach(item => {
            list.innerHTML += `<div class="card"><img src="${item.img || ''}" class="food-img"><div class="info"><div class="title">${isEn ? item.en : item.am}</div><div class="ingred">${item.ing || ''}</div><div class="price">${item.price} ETB</div></div></div>`;
        });
    }

    function refreshAdminTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        document.getElementById('actionHeader').style.display = (adminMode === 'none' ? 'none' : 'table-cell');
        data.forEach((item, index) => {
            let action = "";
            if(adminMode === 'delete') action = `<button onclick="deleteItem('${item.id}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px;">Del</button>`;
            if(adminMode === 'move') {
                let options = categories.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
                action = `<select onchange="moveItem('${item.id}', this.value)"><option>Move...</option>${options}</select>`;
            }
            if(adminMode === 'hide') action = `<button onclick="toggleHideItem(${index})" style="background:#555; color:white; border:none; padding:5px; border-radius:4px;">${item.hidden ? 'Restore' : 'Hide'}</button>`;
            
            tbody.innerHTML += `<tr class="${item.hidden ? 'hidden-row' : ''}"><td><input value="${item.en}" onchange="data[${index}].en=this.value" style="width:100%"></td><td><input value="${item.am}" onchange="data[${index}].am=this.value" style="width:100%"></td><td><input value="${item.ing || ''}" onchange="data[${index}].ing=this.value" style="width:100%"></td><td><input type="number" value="${item.price}" onchange="data[${index}].price=this.value" style="width:100%"></td><td><img src="${item.img || ''}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"><input type="file" id="file-${index}" style="display:none" onchange="updateItemImage(${index}, this)"><button onclick="document.getElementById('file-${index}').click()" style="font-size:10px; display:block;">Photo</button></td><td style="display:${adminMode === 'none' ? 'none' : 'table-cell'}">${action}</td></tr>`;
        });
    }

    function handleLogin() { 
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") { 
            alert("Welcome To SGS Hotel Admin");
            document.getElementById('adminDashboard').style.display = 'block'; 
            hideLogin(); 
            refreshAdminTable(); 
        } else { alert("Error"); } 
    }

    function closeAdmin() { 
        document.getElementById('adminDashboard').style.display = 'none'; 
        // Correction 1: Clear credentials on Logout
        document.getElementById('userInput').value = "";
        document.getElementById('passInput').value = "";
    }

    // Correction 2: Category Logic
    function openCatModal() { document.getElementById('catModal').style.display = 'flex'; }
    function closeCatModal() { document.getElementById('catModal').style.display = 'none'; tempCatImg = ""; }
    function processCatFile(input) { const reader = new FileReader(); reader.onload = (e) => { tempCatImg = e.target.result; }; if(input.files[0]) reader.readAsDataURL(input.files[0]); }
    function submitNewCategory() {
        const id = document.getElementById('catId').value;
        const en = document.getElementById('catNameEn').value;
        const am = document.getElementById('catNameAm').value;
        if(id && en) {
            categories.push({id, en, am, img: tempCatImg || 'https://via.placeholder.com/300'});
            renderNav();
            closeCatModal();
            alert("Category Added Locally. Click Sync to Save Permanently.");
        }
    }
    function toggleDeleteCatMode() {
        let catId = prompt("Enter the Category ID to remove (e.g. breakfast):");
        if(catId) {
            categories = categories.filter(c => c.id !== catId);
            renderNav();
        }
    }

    async function saveToCloud() {
        const btn = document.getElementById('cloudBtn');
        btn.innerText = "⏳ SYNCING...";
        btn.disabled = true;
        try {
            // Note: Since Google Sheet structure is simple, we only send item data. 
            // If you want categories saved to the sheet, you'd need a separate tab or logic in Apps Script.
            await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("SGS Menu Cloud Sync Complete!");
            closeAdmin();
        } catch (e) { alert("Sync Failed"); }
        finally { btn.innerText = "💾 SAVE & SYNC TO GOOGLE SHEETS"; btn.disabled = false; }
    }

    function toggleDeleteMode() { adminMode = adminMode === 'delete' ? 'none' : 'delete'; refreshAdminTable(); }
    function toggleMoveMode() { adminMode = adminMode === 'move' ? 'none' : 'move'; refreshAdminTable(); }
    function toggleHideMode() { adminMode = adminMode === 'hide' ? 'none' : 'hide'; refreshAdminTable(); }
    function deleteItem(id) { data = data.filter(i => i.id != id); refreshAdminTable(); }
    function moveItem(id, cat) { const i = data.find(x => x.id == id); if(i && cat !== "Move...") { i.cat = cat; refreshAdminTable(); } }
    function toggleHideItem(idx) { data[idx].hidden = !data[idx].hidden; refreshAdminTable(); }
    function updateItemImage(idx, input) { const reader = new FileReader(); reader.onload = (e) => { data[idx].img = e.target.result; refreshAdminTable(); }; if(input.files[0]) reader.readAsDataURL(input.files[0]); }
    function processFile(input) { const reader = new FileReader(); reader.onload = (e) => { tempImgBase64 = e.target.result; }; if(input.files[0]) reader.readAsDataURL(input.files[0]); }
    function submitNewItem() { data.push({ id: Date.now(), cat: document.getElementById('newCat').value, en: document.getElementById('newEn').value, am: document.getElementById('newAm').value, ing: document.getElementById('newIng').value, price: document.getElementById('newPrice').value, img: tempImgBase64, hidden: false }); closeAddModal(); refreshAdminTable(); }
    function changeCat(c) { currentCat = c; renderNav(); render(); }
    function toggleLang() { currentLang = currentLang === 'en' ? 'am' : 'en'; renderNav(); render(); }
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; tempImgBase64 = ""; }
    
    fetchMenu();
</script>
</body>
</html>
