<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-orange: #FF8C00; --gold: #D4AF37; --bg: #ffffff; --dark: #121212; }
        
        /* High-Performance Scrolling */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-overflow-scrolling: touch; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 80px; font-family: 'Poppins', sans-serif; }
        .lang-am { font-family: 'Noto Sans Ethiopic', sans-serif; }

        /* 1 & 2. Amazing Top Design & Background */
        .header { 
            background: #1a1a1a;
            background-image: radial-gradient(circle at 20% 150%, rgba(255,140,0,0.15) 0%, transparent 50%), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
            position: sticky; top: 0; z-index: 100;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 32px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        /* 3. Golden "Menu" Word */
        .menu-label { 
            color: var(--gold); 
            font-weight: 700; 
            font-size: 18px; 
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Multilingual Category Bar */
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 125px; z-index: 90; border-bottom: 1px solid #eee; }
        .nav-item { text-align: center; min-width: 100px; cursor: pointer; transition: 0.2s; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--p-orange); transform: scale(1.05); }
        .nav-item img { width: 50px; height: 50px; border-radius: 50%; display: block; margin: 0 auto 5px; border: 2px solid #f0f0f0; object-fit: cover; }
        .nav-item.active img { border-color: var(--p-orange); }

        /* 5 & 6. Speed-Optimized Menu List (No Popups) */
        .container { padding: 15px; }
        .card { 
            display: flex; align-items: center; background: white; border-radius: 12px; 
            margin-bottom: 12px; padding: 10px; border: 1px solid #f5f5f5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            will-change: transform; /* Speed optimization */
        }
        .food-img { 
            width: 85px; height: 85px; border-radius: 10px; 
            object-fit: cover; margin-right: 15px; 
            background: #eee; /* Placeholder while loading */
        }
        .info { flex: 1; }
        .title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 2px; }
        .price { font-size: 15px; font-weight: 700; color: var(--p-orange); }

        /* Visible Admin Access */
        .footer-tools { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); display: flex; padding: 12px; z-index: 500; border-top: 1px solid #eee; }
        .btn-action { flex: 1; margin: 0 5px; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .btn-lang { background: var(--p-orange); color: white; }
        .btn-admin { background: #333; color: white; }

        /* Admin Table Dashboard */
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:15px; overflow-y:auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .edit-input { width: 100%; border: 1px solid #ccc; padding: 5px; border-radius: 3px; }

        /* Login */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2500; align-items:center; justify-content:center; }
        .login-card { background:white; padding:30px; border-radius:15px; width:85%; max-width:320px; text-align:center; }
    </style>
</head>
<body id="bodyTag">

<header class="header">
    <h1 id="displayHotelName">SGS HOTEL</h1>
    <div class="menu-label">MENU</div>
</header>

<nav class="nav-bar">
    <div class="nav-item active" id="cat-breakfast" onclick="changeCat('breakfast')">
        <img src="b1.jpg" loading="lazy">
        <span id="nav-text-break">Breakfast</span>
    </div>
    <div class="nav-item" id="cat-lunchdinner" onclick="changeCat('lunchdinner')">
        <img src="l1.jpg" loading="lazy">
        <span id="nav-text-lunch">Lunch/Dinner</span>
    </div>
    <div class="nav-item" id="cat-beverages" onclick="changeCat('beverages')">
        <img src="d1.jpg" loading="lazy">
        <span id="nav-text-bev">Beverages</span>
    </div>
</nav>

<div class="container" id="menuListing"></div>

<div class="footer-tools">
    <button class="btn-action btn-admin" onclick="showLogin()">ADMIN LOGIN</button>
    <button class="btn-action btn-lang" onclick="toggleLang()">ENGLISH / አማርኛ</button>
</div>

<div id="loginOverlay" class="overlay">
    <div class="login-card">
        <h2>STAFF ONLY</h2><br>
        <input type="text" id="userInput" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px;">
        <input type="password" id="passInput" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px;">
        <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--p-orange); color:white; border:none; border-radius:5px;">ENTER DASHBOARD</button>
        <p onclick="hideLogin()" style="margin-top:15px; color:gray; cursor:pointer;">Cancel</p>
    </div>
</div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>MANAGEMENT TABLE</h3>
        <button onclick="closeAdmin()" style="color:red; font-weight:bold; border:none; background:none;">CLOSE</button>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>ID</th><th>Name (EN)</th><th>Name (AM)</th><th>Price</th><th>Img</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button onclick="saveAndClear()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:8px; margin-top:20px; font-weight:700;">SAVE ALL CHANGES</button>
</div>

<script>
    let currentLang = 'en';
    let currentCat = 'breakfast';
    
    // Integrated Database
    let data = [
        { id: 1, cat: 'breakfast', en: 'Kitfo Royale', am: 'ክትፎ ሮያል', price: 500, img: 'b1.jpg' },
        { id: 2, cat: 'breakfast', en: 'Special Omelet', am: 'ልዩ እንቁላል ፍርፍር', price: 350, img: 'b2.jpg' },
        { id: 3, cat: 'breakfast', en: 'Chechebsa', am: 'ጨጨብሳ', price: 300, img: 'b3.jpg' },
        { id: 4, cat: 'breakfast', en: 'Full Breakfast', am: 'ቁርስ በሙሉ', price: 450, img: 'b4.jpg' },
        { id: 5, cat: 'lunchdinner', en: 'Golden Dorowet', am: 'ወርቃማው ዶሮወጥ', price: 600, img: 'l1.jpg' },
        { id: 6, cat: 'lunchdinner', en: 'Tegabino Shiro', am: 'ተጋቢኖ ሽሮ', price: 250, img: 'l2.jpg' },
        { id: 7, cat: 'lunchdinner', en: 'Margherita Pizza', am: 'ፒዛ ማርጋሪታ', price: 480, img: 'l3.jpg' },
        { id: 8, cat: 'lunchdinner', en: 'SGS Burger', am: 'ኤስ ጂ ኤስ በርገር', price: 550, img: 'l4.jpg' },
        { id: 9, cat: 'beverages', en: 'SGS Macchiato', am: 'ኤስ ጂ ኤስ ማኪያቶ', price: 60, img: 'd1.jpg' },
        { id: 10, cat: 'beverages', en: 'Mango Juice', am: 'የማንጎ ጭማቂ', price: 120, img: 'd2.jpg' },
        { id: 11, cat: 'beverages', en: 'St. George Beer', am: 'ቅዱስ ጊዮርጊስ ቢራ', price: 150, img: 'd3.jpg' },
        { id: 12, cat: 'beverages', en: 'Soft Drink', am: 'ቀዝቃዛ ለስላሳ መጠጥ', price: 80, img: 'd4.jpg' }
    ];

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        
        // 1. Multilingual Hotel Name
        document.getElementById('displayHotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');

        // Update Nav Text
        document.getElementById('nav-text-break').innerText = (currentLang === 'en' ? 'Breakfast' : 'ቁርስ');
        document.getElementById('nav-text-lunch').innerText = (currentLang === 'en' ? 'Lunch/Dinner' : 'ምሳ/እራት');
        document.getElementById('nav-text-bev').innerText = (currentLang === 'en' ? 'Beverages' : 'መጠጦች');

        const filtered = data.filter(i => i.cat === currentCat);
        filtered.forEach(item => {
            const title = (currentLang === 'en' ? item.en : item.am);
            list.innerHTML += `
                <div class="card">
                    <img src="${item.img}" class="food-img" loading="lazy">
                    <div class="info">
                        <div class="title">${title}</div>
                        <div class="price">${item.price} ETB</div>
                    </div>
                </div>`;
        });
        document.getElementById('bodyTag').className = (currentLang === 'am' ? 'lang-am' : '');
    }

    function changeCat(c) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('cat-'+c).classList.add('active');
        render();
    }

    function toggleLang() {
        currentLang = (currentLang === 'en' ? 'am' : 'en');
        render();
    }

    // 4. Admin Security (No Save Login)
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { 
        document.getElementById('userInput').value = ""; 
        document.getElementById('passInput').value = ""; 
        document.getElementById('loginOverlay').style.display = 'none'; 
    }

    function handleLogin() {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === "admin" && p === "sgs") {
            alert("SUCCESS: Welcome to Admin Mode");
            openAdmin();
            hideLogin();
        } else { alert("Incorrect Credentials"); }
    }

    function openAdmin() {
        document.getElementById('adminDashboard').style.display = 'block';
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.id}</td>
                    <td><input class="edit-input" value="${item.en}" onchange="editItem(${index}, 'en', this.value)"></td>
                    <td><input class="edit-input" value="${item.am}" onchange="editItem(${index}, 'am', this.value)"></td>
                    <td><input class="edit-input" type="number" value="${item.price}" onchange="editItem(${index}, 'price', this.value)"></td>
                    <td><input class="edit-input" value="${item.img}" onchange="editItem(${index}, 'img', this.value)"></td>
                </tr>`;
        });
    }

    function editItem(idx, key, val) { data[idx][key] = val; }
    function saveAndClear() { alert("Changes Saved!"); closeAdmin(); }
    function closeAdmin() { 
        document.getElementById('adminDashboard').style.display = 'none'; 
        render(); 
    }

    render();
</script>
</body>
</html>
