<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #4F7942; --dark-green: #3E5F34; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 115px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 28px; text-align: center; flex-grow: 1; }
        
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 115px; z-index: 900; border-bottom: 1px solid #eee; min-height: 110px; scroll-behavior: smooth; }
        .nav-item { text-align: center; min-width: 100px; opacity: 0.6; cursor: pointer; transition: 0.3s; padding: 5px; border-bottom: 3px solid transparent; }
        .nav-item.active { opacity: 1; transform: scale(1.1); font-weight: bold; color: var(--p-green); border-bottom: 3px solid var(--p-green); }
        .nav-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; margin-bottom: 5px; pointer-events: none; }
        
        .container { padding: 12px; min-height: 60vh; }
        .card { display: flex; align-items: center; background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .food-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #f9f9f9; }
        
        .food-title { color: var(--p-green); font-size: 19px; font-weight: 600; line-height: 1.2; }
        .food-ing { font-size: 11px; color: #777; font-style: italic; margin-top: 3px; }
        
        .call-order-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark-green); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; z-index: 2000; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y: auto; }
        .admin-section { border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 6px; text-align: left; }
        input, select { width: 100%; padding: 6px; margin: 2px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<header class="header">
    <div onclick="showLogin()" style="cursor:pointer; font-size:24px; padding:10px;">☰</div>
    <div style="text-align:center;">
        <h1 id="mainTitle">SGS HOTEL</h1>
        <div id="vatLabel" style="font-size:10px; opacity:0.8;">VAT Included</div>
    </div>
    <button onclick="toggleLang()" style="background:white; color:var(--dark-green); border:none; padding:8px 12px; border-radius:20px; font-weight:bold; font-size:11px; margin-right:10px;">EN/አማ</button>
</header>

<nav class="nav-bar" id="categoryNav"></nav>
<div class="container" id="menuListing"></div>

<a href="tel:+251954954591" class="call-order-btn">📞 <span id="callBtnText">Call To Order</span></a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-green); padding:15px; color:white; border-radius:10px;">
        <h3>SGS MANAGER</h3>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:30px;">×</button>
    </div>

    <div class="admin-section" style="margin-top:20px;">
        <h4>1. Categories</h4>
        <div id="adminCatList" style="display:flex; overflow-x:auto; gap:10px; margin:10px 0;"></div>
        <button class="btn" style="background:#8e44ad; width:100%;" onclick="openCatModal()">+ Add Category</button>
    </div>

    <div class="admin-section">
        <h4>2. Bulk Edit Items</h4>
        <button class="btn" style="background:#27ae60; margin-bottom:10px; width:100%;" onclick="openItemModal()">+ Add New Item</button>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr style="background:#f9f9f9;"><th>Names/Ing</th><th>Price</th><th>Category/Pic</th><th>Action</th></tr></thead>
                <tbody id="adminItemBody"></tbody>
            </table>
        </div>
    </div>

    <button id="cloudBtn" onclick="saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; position:sticky; bottom:0;">💾 SYNC UPDATES</button>
</div>

<input type="file" id="editPicInput" style="display:none;" onchange="updateItemPhoto(this)">

<div id="catModal" class="overlay"><div class="modal">
    <h3>New Category</h3>
    <input type="text" id="nCatId" placeholder="ID (e.g. drinks)">
    <input type="text" id="nCatEn" placeholder="English Name">
    <input type="text" id="nCatAm" placeholder="Amharic Name">
    <input type="file" onchange="handleImg(this)">
    <button onclick="addCat()" class="btn" style="background:#8e44ad; width:100%; margin-top:10px;">Create</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="itemModal" class="overlay"><div class="modal">
    <h3>New Item</h3>
    <select id="nItemCat"></select>
    <input type="text" id="nItemEn" placeholder="English Name">
    <input type="text" id="nItemAm" placeholder="Amharic Name">
    <input type="text" id="nItemIng" placeholder="Ingredients">
    <input type="number" id="nItemPrice" placeholder="Price">
    <input type="file" onchange="handleImg(this)">
    <button onclick="addItem()" class="btn" style="background:#27ae60; width:100%; margin-top:10px;">Add Item</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" style="text-align:center;">
    <h3>STAFF LOGIN</h3>
    <input type="text" id="uIn" placeholder="User">
    <input type="password" id="pIn" placeholder="Pass">
    <button onclick="doLogin()" class="btn" style="background:var(--dark-green); width:100%; margin-top:10px;">LOGIN</button>
</div></div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzUs_R4tSRSWfZN5WWwoUa1_8qxHbs95fQk83xDwd9TZ9wzGnlxxLuEmFpTgfaZ2aKOnA/exec";
    let data = [], categories = [], curLang = 'en', curCat = '', tmpImg = "", editingIdx = null;

    async function fetchData() {
        document.getElementById('menuListing').innerHTML = "<p style='text-align:center; padding:40px;'>Syncing...</p>";
        try {
            const res = await fetch(`${SHEET_URL}?t=${Date.now()}`);
            const json = await res.json();
            data = json.items || [];
            categories = json.cats || [];
            if(categories.length > 0 && !curCat) curCat = categories[0].id;
            render();
        } catch (e) { alert("Network Error"); }
    }

    function render() {
        const isEn = curLang === 'en';
        document.getElementById('mainTitle').innerText = isEn ? "SGS HOTEL" : "ኤስ.ጂ.ኤስ ሆቴል";
        document.getElementById('vatLabel').innerText = isEn ? "VAT Included" : "ታክስ ያካትታል";
        document.getElementById('callBtnText').innerText = isEn ? "Call To Order" : "ለመዘዝ ይደውሉ";
        
        // Render Nav
        const nav = document.getElementById('categoryNav');
        nav.innerHTML = categories.map(c => `
            <div class="nav-item ${curCat === c.id ? 'active' : ''}" onclick="setCat('${c.id}')">
                <img src="${c.img || ''}">
                <p style="font-size:11px;">${isEn ? c.en : c.am}</p>
            </div>`).join('');

        // Render Items
        const filtered = data.filter(i => i.cat === curCat && !i.hidden);
        document.getElementById('menuListing').innerHTML = filtered.length ? filtered.map(i => `
            <div class="card">
                <img src="${i.img || ''}" class="food-img">
                <div class="info">
                    <div class="food-title">${isEn ? i.en : i.am}</div>
                    <div class="food-ing">${i.ing || ''}</div>
                    <div style="font-weight:bold; margin-top:8px; color:var(--dark-green);">${i.price} ETB</div>
                </div>
            </div>`).join('') : "<p style='text-align:center; padding:40px; opacity:0.5;'>Empty</p>";
        
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('adminCatList').innerHTML = categories.map(c => `
            <div style="min-width:80px; text-align:center; border:1px solid #ddd; padding:5px; border-radius:8px;">
                <p style="font-size:10px;">${c.en}</p>
                <button onclick="delCat('${c.id}')" style="color:red; border:none; background:none; font-size:9px;">Del</button>
            </div>`).join('');

        document.getElementById('adminItemBody').innerHTML = data.map((i, idx) => `
            <tr style="${i.hidden ? 'opacity:0.4' : ''}">
                <td>
                    <input value="${i.en}" onchange="data[${idx}].en=this.value">
                    <input value="${i.am}" onchange="data[${idx}].am=this.value">
                    <input value="${i.ing || ''}" onchange="data[${idx}].ing=this.value" style="font-size:9px;">
                </td>
                <td><input type="number" value="${i.price}" onchange="data[${idx}].price=this.value" style="width:50px;"></td>
                <td>
                    <select onchange="data[${idx}].cat=this.value; render();" style="font-size:10px;">
                        ${categories.map(c => `<option value="${c.id}" ${i.cat === c.id ? 'selected' : ''}>${c.en}</option>`).join('')}
                    </select>
                    <button class="btn" style="background:#3498db; width:100%; margin-top:2px;" onclick="triggerEditPic(${idx})">Change Pic</button>
                </td>
                <td>
                    <button onclick="tglHdn(${idx})" style="background:#444; color:white; padding:4px; border:none; width:100%; margin-bottom:2px;">${i.hidden?'Show':'Hide'}</button>
                    <button onclick="delItm(${idx})" style="background:red; color:white; padding:4px; border:none; width:100%;">Del</button>
                </td>
            </tr>`).join('');
        document.getElementById('nItemCat').innerHTML = categories.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
    }

    function setCat(id) { curCat = id; render(); }
    function toggleLang() { curLang = curLang === 'en' ? 'am' : 'en'; render(); }

    function triggerEditPic(idx) { editingIdx = idx; document.getElementById('editPicInput').click(); }
    function updateItemPhoto(input) {
        const r = new FileReader();
        r.onload = (e) => { data[editingIdx].img = e.target.result; render(); };
        if(input.files[0]) r.readAsDataURL(input.files[0]);
    }

    async function saveToCloud() {
        const b = document.getElementById('cloudBtn');
        b.innerText = "Syncing..."; b.disabled = true;
        try {
            await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: data, cats: categories }) });
            alert("Updated Successfully!");
            closeAdmin(); fetchData();
        } catch (e) { alert("Sync Error"); }
        finally { b.innerText = "💾 SYNC UPDATES"; b.disabled = false; }
    }

    function doLogin() { if(document.getElementById('uIn').value==="admin" && document.getElementById('pIn').value==="sgs") { document.getElementById('adminDashboard').style.display='block'; closeModals(); } else { alert("Error"); } }
    function handleImg(input) { const r = new FileReader(); r.onload = (e) => { tmpImg = e.target.result; }; if(input.files[0]) r.readAsDataURL(input.files[0]); }
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); tmpImg = ""; }
    function openCatModal() { document.getElementById('catModal').style.display = 'flex'; }
    function openItemModal() { document.getElementById('itemModal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('adminDashboard').style.display='none'; }
    function addCat() { categories.push({id: document.getElementById('nCatId').value, en: document.getElementById('nCatEn').value, am: document.getElementById('nCatAm').value, img: tmpImg}); closeModals(); render(); }
    function addItem() { data.push({id: Date.now(), cat: document.getElementById('nItemCat').value, en: document.getElementById('nItemEn').value, am: document.getElementById('nItemAm').value, ing: document.getElementById('nItemIng').value, price: document.getElementById('nItemPrice').value, img: tmpImg, hidden: false}); closeModals(); render(); }
    function tglHdn(idx) { data[idx].hidden = !data[idx].hidden; renderAdmin(); }
    function delItm(idx) { if(confirm("Delete?")) { data.splice(idx,1); renderAdmin(); } }
    function delCat(id) { if(confirm("Delete?")) { categories = categories.filter(c => c.id !== id); render(); } }

    fetchData();
</script>
</body>
</html>
