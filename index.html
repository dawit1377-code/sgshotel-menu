<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-orange: #E67E22; --dark-orange: #D35400; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; overscroll-behavior-y: contain; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; }
        .header { background: var(--dark-orange); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .hotel-brand { text-align: center; flex-grow: 1; }
        .hotel-brand h1 { font-family: 'Playfair Display', serif; font-size: 23px; line-height: 1; }
        .hotel-brand span { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #ffe0b2; display: block; }
        .menu-icon { font-size: 24px; cursor: pointer; color: white; width: 40px; }
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 65px; z-index: 900; border-bottom: 1px solid #eee; }
        .nav-item { text-align: center; min-width: 140px; opacity: 0.5; transition: 0.2s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: scale(1.05); }
        .nav-item img { width: 90px; height: 90px; border-radius: 50%; display: block; margin: 0 auto 8px; border: 3px solid #f0f0f0; object-fit: cover; }
        .container { padding: 12px; min-height: 60vh; }
        .card { display: flex; align-items: center; background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .food-img { width: 110px; height: 110px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #eee; }
        .info .title { font-size: 17px; font-weight: 600; color: var(--p-orange); }
        .info .price { font-size: 16px; font-weight: 700; color: var(--dark-orange); margin-top: 5px; }
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y: scroll; }
        .action-btn { flex: 1; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #eee; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<header class="header">
    <div class="menu-icon" onclick="showLogin()">☰</div>
    <div class="hotel-brand">
        <h1 id="displayHotelName">SGS HOTEL</h1>
        <span id="menu-label">MENU</span>
    </div>
    <button onclick="toggleLang()" style="border:none; background:white; color:var(--dark-orange); padding:5px 10px; border-radius:15px; font-size:11px; font-weight:bold;">EN/አማ</button>
</header>

<nav class="nav-bar">
    <div class="nav-item active" id="cat-breakfast" onclick="changeCat('breakfast')">
        <img src="b1.jpg"><span id="txt-break">Breakfast</span>
    </div>
    <div class="nav-item" id="cat-lunchdinner" onclick="changeCat('lunchdinner')">
        <img src="l1.jpg"><span id="txt-lunch">Lunch/Dinner</span>
    </div>
    <div class="nav-item" id="cat-beverages" onclick="changeCat('beverages')">
        <img src="d1.jpg"><span id="txt-bev">Beverages</span>
    </div>
</nav>

<div class="container" id="menuListing">
    <p style="text-align:center; margin-top:50px; color:#999;">Loading Menu...</p>
</div>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-orange); padding:15px; color:white;">
        <h3>SGS MANAGER</h3>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:30px;">×</button>
    </div>
    <div style="display:flex; gap:5px; margin-top:15px;">
        <button class="action-btn" style="background:#27ae60" onclick="openAddModal()">➕ ADD</button>
        <button class="action-btn" style="background:#2980b9" onclick="toggleMoveMode()">🔄 MOVE</button>
        <button class="action-btn" style="background:#c0392b" onclick="toggleDeleteMode()">🗑️ DELETE</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>EN Name</th><th>AM Name</th><th>Price</th><th>Photo</th><th id="actionHeader" style="display:none">Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <button onclick="saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">💾 SAVE & SYNC ALL DEVICES</button>
</div>

<div id="addModal" class="overlay"><div class="modal">
    <h3>New Item</h3>
    <select id="newCat"><option value="breakfast">Breakfast</option><option value="lunchdinner">Lunch/Dinner</option><option value="beverages">Beverages</option></select>
    <input type="text" id="newEn" placeholder="English Name">
    <input type="text" id="newAm" placeholder="Amharic Name">
    <input type="number" id="newPrice" placeholder="Price">
    <input type="file" onchange="processFile(this, 'temp')">
    <button onclick="submitNewItem()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; margin-top:10px;">ADD ITEM</button>
    <button onclick="closeAddModal()" style="width:100%; border:none; background:none; color:red; margin-top:10px;">Cancel</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" style="text-align:center;">
    <h3>STAFF LOGIN</h3>
    <input type="text" id="userInput" placeholder="User">
    <input type="password" id="passInput" placeholder="Pass">
    <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--dark-orange); color:white; border:none; border-radius:8px; margin-top:10px;">LOGIN</button>
    <button onclick="hideLogin()" style="width:100%; border:none; background:none; color:gray; margin-top:10px;">Cancel</button>
</div></div>

<script>
    // --- YOUR SPECIFIC FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDhV9y3R77R_4W2pZMOngCgZICyX45B_Ug",
      authDomain: "sgs-menu.firebaseapp.com",
      projectId: "sgs-menu",
      databaseURL: "https://sgs-menu-default-rtdb.firebaseio.com",
      storageBucket: "sgs-menu.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentLang = 'en', currentCat = 'breakfast', adminMode = 'none', data = [], tempImgBase64 = "";

    // Sync from Cloud
    db.ref('menuData').on('value', (snap) => {
        data = snap.val() || [];
        render();
    });

    function render() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "";
        document.getElementById('displayHotelName').innerText = (currentLang === 'en' ? 'SGS HOTEL' : 'ኤስ ጂ ኤስ ሆቴል');
        
        data.filter(i => i.cat === currentCat).forEach(item => {
            list.innerHTML += `<div class="card">
                <img src="${item.img}" class="food-img" onerror="this.src='https://via.placeholder.com/110'">
                <div class="info">
                    <div class="title">${currentLang === 'en' ? item.en : item.am}</div>
                    <div class="price">${item.price} ETB</div>
                </div>
            </div>`;
        });
    }

    function changeCat(c) {
        currentCat = c;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('cat-'+c).classList.add('active');
        render();
    }

    function toggleLang() { currentLang = (currentLang === 'en' ? 'am' : 'en'); render(); }
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    
    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") {
            document.getElementById('adminDashboard').style.display = 'block';
            hideLogin(); refreshAdminTable();
        } else { alert("Wrong password"); }
    }

    function refreshAdminTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        document.getElementById('actionHeader').style.display = (adminMode === 'none' ? 'none' : 'table-cell');

        data.forEach((item, index) => {
            let action = "";
            if(adminMode === 'delete') action = `<button onclick="deleteItem(${item.id})" style="background:red; color:white; border:none; padding:5px;">Del</button>`;
            if(adminMode === 'move') action = `<select onchange="moveItem(${item.id}, this.value)"><option>Move...</option><option value="breakfast">Breakfast</option><option value="lunchdinner">Lunch</option><option value="beverages">Beverages</option></select>`;

            tbody.innerHTML += `<tr>
                <td><input value="${item.en}" onchange="data[${index}].en=this.value" class="edit-input"></td>
                <td><input value="${item.am}" onchange="data[${index}].am=this.value" class="edit-input"></td>
                <td><input type="number" value="${item.price}" onchange="data[${index}].price=this.value" class="edit-input"></td>
                <td><img src="${item.img}" style="width:40px; height:40px; object-fit:cover;"></td>
                <td style="display:${adminMode === 'none' ? 'none' : 'table-cell'}">${action}</td>
            </tr>`;
        });
    }

    function toggleDeleteMode() { adminMode = (adminMode === 'delete' ? 'none' : 'delete'); refreshAdminTable(); }
    function toggleMoveMode() { adminMode = (adminMode === 'move' ? 'none' : 'move'); refreshAdminTable(); }
    function deleteItem(id) { data = data.filter(i => i.id !== id); refreshAdminTable(); }
    function moveItem(id, cat) { const item = data.find(i => i.id === id); if(item && cat !== "Move...") { item.cat = cat; refreshAdminTable(); } }

    function processFile(input, type) {
        const reader = new FileReader();
        reader.onload = (e) => { tempImgBase64 = e.target.result; };
        if(input.files[0]) reader.readAsDataURL(input.files[0]);
    }

    function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

    function submitNewItem() {
        data.push({ id: Date.now(), cat: document.getElementById('newCat').value, en: document.getElementById('newEn').value, am: document.getElementById('newAm').value, price: document.getElementById('newPrice').value, img: tempImgBase64 || '' });
        closeAddModal(); refreshAdminTable();
    }

    function saveToCloud() {
        db.ref('menuData').set(data).then(() => {
            alert("SUCCESS: Updated for every device!");
            document.getElementById('adminDashboard').style.display = 'none';
        });
    }

    function closeAdmin() { document.getElementById('adminDashboard').style.display = 'none'; }
</script>
</body>
</html>
