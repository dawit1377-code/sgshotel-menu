<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGS Hotel Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-green: #4F7942; --dark-green: #3E5F34; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #333; font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 115px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 25px; text-align: center; width: 100%; }
        
        .nav-bar { display: flex; overflow-x: auto; padding: 15px 5px; background: #fff; position: sticky; top: 115px; z-index: 900; border-bottom: 1px solid #eee; min-height: 120px; }
        .nav-item { text-align: center; min-width: 110px; opacity: 0.6; cursor: pointer; transition: 0.3s; padding: 5px; }
        .nav-item.active { opacity: 1; transform: scale(1.05); font-weight: bold; border-bottom: 3px solid var(--p-green); }
        .nav-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; margin-bottom: 5px; pointer-events: none; }
        
        .container { padding: 12px; min-height: 60vh; }
        .card { display: flex; align-items: center; background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; border: 1px solid #f2f2f2; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .food-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
        
        .title-group { display: flex; flex-direction: column; }
        .title-en { color: var(--p-green); font-size: 17px; font-weight: 600; }
        .title-am { color: #555; font-size: 14px; margin-top: -2px; }
        
        .call-order-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark-green); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; z-index: 2000; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        #adminDashboard { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:3000; padding:10px; overflow-y: auto; }
        .admin-section { border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; align-items:center; justify-content:center; }
        .modal { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 5px; text-align: left; }
        input, select { width: 100%; padding: 6px; margin: 2px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<header class="header">
    <div onclick="showLogin()" style="cursor:pointer; font-size:24px; padding-left:10px;">☰</div>
    <div style="text-align:center; flex-grow:1;">
        <h1>SGS HOTEL</h1>
        <span style="font-size:10px; letter-spacing:2px;">MENU / ሜኑ</span>
        <div style="font-size:9px; font-style:italic; opacity:0.9;">VAT Included / ታክስ ያካትታል</div>
    </div>
    <div onclick="location.reload()" style="cursor:pointer; font-size:20px; padding-right:10px;">🔄</div>
</header>

<nav class="nav-bar" id="categoryNav"></nav>
<div class="container" id="menuListing"></div>

<a href="tel:+251954954591" class="call-order-btn">📞 Call To Order / ለመዘዝ ይደውሉ</a>

<div id="adminDashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--dark-green); padding:15px; color:white; border-radius:10px;">
        <h3>SGS MANAGER</h3>
        <button onclick="closeAdmin()" style="color:white; border:none; background:none; font-size:30px;">×</button>
    </div>

    <div class="admin-section" style="margin-top:20px;">
        <h4>1. Categories</h4>
        <div id="adminCatList" style="display:flex; overflow-x:auto; gap:10px; margin:10px 0;"></div>
        <button class="btn" style="background:#8e44ad; width:100%;" onclick="openCatModal()">+ Add Category</button>
    </div>

    <div class="admin-section">
        <h4>2. Bulk Edit Items</h4>
        <button class="btn" style="background:#27ae60; margin-bottom:10px; width:100%;" onclick="openItemModal()">+ Add New Food Item</button>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr style="background:#f9f9f9;"><th>Names/Ing</th><th>Price</th><th>Move</th><th>Action</th></tr></thead>
                <tbody id="adminItemBody"></tbody>
            </table>
        </div>
    </div>

    <button id="cloudBtn" onclick="saveToCloud()" style="width:100%; padding:20px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; position:sticky; bottom:0; box-shadow: 0 -5px 10px rgba(0,0,0,0.1);">💾 SYNC ALL UPDATES</button>
</div>

<div id="catModal" class="overlay"><div class="modal">
    <h3>New Category</h3>
    <input type="text" id="newCatId" placeholder="ID (e.g. pizza)">
    <input type="text" id="newCatEn" placeholder="English Name">
    <input type="text" id="newCatAm" placeholder="Amharic Name">
    <input type="file" onchange="handleFile(this)">
    <button onclick="submitCategory()" class="btn" style="background:#8e44ad; width:100%; margin-top:10px;">Create</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="itemModal" class="overlay"><div class="modal">
    <h3>New Item</h3>
    <select id="newItemCat"></select>
    <input type="text" id="newItemEn" placeholder="English Name">
    <input type="text" id="newItemAm" placeholder="Amharic Name">
    <input type="text" id="newItemIng" placeholder="Ingredients">
    <input type="number" id="newItemPrice" placeholder="Price">
    <input type="file" onchange="handleFile(this)">
    <button onclick="submitItem()" class="btn" style="background:#27ae60; width:100%; margin-top:10px;">Add</button>
    <button onclick="closeModals()" class="btn" style="background:gray; width:100%; margin-top:5px;">Cancel</button>
</div></div>

<div id="loginOverlay" class="overlay"><div class="modal" style="text-align:center;">
    <h3>STAFF LOGIN</h3>
    <input type="text" id="userInput" placeholder="Username">
    <input type="password" id="passInput" placeholder="Password">
    <button onclick="handleLogin()" class="btn" style="background:var(--dark-green); width:100%; margin-top:10px;">LOGIN</button>
</div></div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzUs_R4tSRSWfZN5WWwoUa1_8qxHbs95fQk83xDwd9TZ9wzGnlxxLuEmFpTgfaZ2aKOnA/exec";
    let data = [], categories = [], currentCat = '', tempImg = "";

    async function fetchData() {
        const list = document.getElementById('menuListing');
        list.innerHTML = "<p style='text-align:center; padding:40px;'>Loading...</p>";
        try {
            const res = await fetch(`${SHEET_URL}?t=${Date.now()}`);
            const json = await res.json();
            data = json.items || [];
            categories = json.cats || [];
            if(categories.length > 0 && !currentCat) currentCat = categories[0].id;
            renderAll();
        } catch (e) { alert("Error connecting to server."); }
    }

    function renderAll() {
        const nav = document.getElementById('categoryNav');
        nav.innerHTML = categories.map(c => `
            <div class="nav-item ${currentCat === c.id ? 'active' : ''}" onclick="setCat('${c.id}')">
                <img src="${c.img || 'https://via.placeholder.com/70'}">
                <p style="font-size:10px;">${c.en}<br>${c.am}</p>
            </div>`).join('');

        const list = document.getElementById('menuListing');
        const filtered = data.filter(i => i.cat === currentCat && !i.hidden);
        list.innerHTML = filtered.length ? filtered.map(i => `
            <div class="card">
                <img src="${i.img || 'https://via.placeholder.com/100'}" class="food-img">
                <div class="info">
                    <div class="title-group">
                        <span class="title-en">${i.en}</span>
                        <span class="title-am">${i.am}</span>
                    </div>
                    <p style="font-size:11px; color:gray;">${i.ing || ''}</p>
                    <p style="font-weight:bold; margin-top:5px; color:var(--dark-green);">${i.price} ETB</p>
                </div>
            </div>`).join('') : "<p style='text-align:center; padding:40px; opacity:0.5;'>No items in this category.</p>";
        
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('adminCatList').innerHTML = categories.map(c => `
            <div style="min-width:70px; text-align:center; border:1px solid #ddd; padding:5px; border-radius:8px;">
                <p style="font-size:9px;">${c.en}</p>
                <button onclick="removeCat('${c.id}')" style="color:red; border:none; background:none; font-size:9px;">Del</button>
            </div>`).join('');

        document.getElementById('adminItemBody').innerHTML = data.map((i, idx) => `
            <tr style="${i.hidden ? 'opacity:0.4' : ''}">
                <td>
                    <input value="${i.en}" onchange="data[${idx}].en=this.value">
                    <input value="${i.am}" onchange="data[${idx}].am=this.value">
                    <input value="${i.ing || ''}" onchange="data[${idx}].ing=this.value" style="font-size:9px;">
                </td>
                <td><input type="number" value="${i.price}" onchange="data[${idx}].price=this.value" style="width:50px;"></td>
                <td>
                    <button onclick="moveItem(${idx}, -1)" style="padding:2px; background:#ddd; border:none;">↑</button>
                    <button onclick="moveItem(${idx}, 1)" style="padding:2px; background:#ddd; border:none;">↓</button>
                </td>
                <td>
                    <button onclick="toggleHide(${idx})" style="background:#444; color:white; font-size:8px; border:none; padding:4px; display:block; width:100%; margin-bottom:2px;">${i.hidden?'Show':'Hide'}</button>
                    <button onclick="removeItem(${idx})" style="background:red; color:white; font-size:8px; border:none; padding:4px; display:block; width:100%;">Del</button>
                </td>
            </tr>`).join('');
        
        document.getElementById('newItemCat').innerHTML = categories.map(c => `<option value="${c.id}">${c.en}</option>`).join('');
    }

    function moveItem(index, direction) {
        let newIdx = index + direction;
        if (newIdx >= 0 && newIdx < data.length) {
            [data[index], data[newIdx]] = [data[newIdx], data[index]];
            renderAdmin();
        }
    }

    function setCat(id) { currentCat = id; renderAll(); }
    
    function submitCategory() {
        categories.push({id: document.getElementById('newCatId').value, en: document.getElementById('newCatEn').value, am: document.getElementById('newCatAm').value, img: tempImg});
        closeModals(); renderAll();
    }

    function submitItem() {
        data.push({id: Date.now(), cat: document.getElementById('newItemCat').value, en: document.getElementById('newItemEn').value, am: document.getElementById('newItemAm').value, ing: document.getElementById('newItemIng').value, price: document.getElementById('newItemPrice').value, img: tempImg, hidden: false});
        closeModals(); renderAll();
    }

    async function saveToCloud() {
        const btn = document.getElementById('cloudBtn');
        btn.innerText = "Syncing..."; btn.disabled = true;
        try {
            await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ items: data, cats: categories }) });
            alert("Sync Complete!");
            closeAdmin(); fetchData();
        } catch (e) { alert("Sync Error"); }
        finally { btn.innerText = "💾 SYNC ALL UPDATES"; btn.disabled = false; }
    }

    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "sgs") {
            document.getElementById('adminDashboard').style.display = 'block';
            closeModals();
        } else { alert("Failed"); }
    }

    function handleFile(input) { const reader = new FileReader(); reader.onload = (e) => { tempImg = e.target.result; }; if(input.files[0]) reader.readAsDataURL(input.files[0]); }
    function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); tempImg = ""; }
    function openCatModal() { document.getElementById('catModal').style.display = 'flex'; }
    function openItemModal() { document.getElementById('itemModal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('adminDashboard').style.display = 'none'; document.getElementById('userInput').value = ""; document.getElementById('passInput').value = ""; }
    function toggleHide(idx) { data[idx].hidden = !data[idx].hidden; renderAdmin(); }
    function removeItem(idx) { data.splice(idx, 1); renderAdmin(); }
    function removeCat(id) { categories = categories.filter(c => c.id !== id); renderAll(); }

    fetchData();
</script>
</body>
</html>
